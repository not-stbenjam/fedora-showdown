<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Red Hat Hero</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b0d12;
        --fg: #d7d9df;
        --accent: #b3122c;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        height: 100%;
        background: var(--bg);
        font-family: "Inter", "SF Pro Text", system-ui, -apple-system, sans-serif;
        color: var(--fg);
      }

      .stage {
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6vh 6vw;
      }

      .frame {
        width: min(880px, 100%);
        aspect-ratio: 5 / 4;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 28px;
        overflow: hidden;
        background: radial-gradient(circle at 50% 30%, #181b22, #0b0d12 60%);
        box-shadow: 0 30px 80px rgba(0, 0, 0, 0.55);
      }

      canvas {
        width: 100%;
        height: 100%;
        display: block;
      }

      .caption {
        position: absolute;
        bottom: 5%;
        left: 50%;
        transform: translateX(-50%);
        font-size: clamp(0.85rem, 1.2vw, 1.05rem);
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(215, 217, 223, 0.75);
      }

      .caption span {
        color: rgba(215, 217, 223, 0.5);
        font-weight: 500;
      }

      @media (max-width: 640px) {
        .frame {
          aspect-ratio: 1 / 1.1;
          border-radius: 20px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .frame {
          box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
      }
    </style>
  </head>
  <body>
    <main class="stage">
      <div class="frame" id="frame">
        <canvas id="scene"></canvas>
        <div class="caption">Classic Red Hat <span>innovation in motion</span></div>
      </div>
    </main>

    <script>
      (() => {
        const prefersReduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        const canvas = document.getElementById("scene");
        const frame = document.getElementById("frame");
        const ctx = canvas.getContext("2d");
        const state = {
          width: 0,
          height: 0,
          dpr: Math.min(window.devicePixelRatio || 1, 2),
          spin: 0,
          spinSpeed: 0.55,
          targetSpeed: 0.55,
          tilt: -0.28,
          fov: 3.2,
          scale: 0,
          center: { x: 0, y: 0 },
          phase: "idle",
          phaseTime: 0,
          hatOpacity: 1,
          particles: [],
          orbiters: [],
          lastTime: performance.now(),
        };

        const durations = {
          dissolve: 1.1,
          swirl: 0.9,
          reform: 1.3,
        };

        const hat = {
          brim: { rx: 1.45, rz: 1.05, thickness: 0.08 },
          crown: { rx: 0.68, rz: 0.52, height: 0.86 },
        };

        const lightDir = normalize({ x: -0.6, y: 0.4, z: 0.7 });

        function normalize(v) {
          const len = Math.hypot(v.x, v.y, v.z) || 1;
          return { x: v.x / len, y: v.y / len, z: v.z / len };
        }

        function resize() {
          const rect = frame.getBoundingClientRect();
          state.width = rect.width;
          state.height = rect.height;
          state.dpr = Math.min(window.devicePixelRatio || 1, 2);
          canvas.width = rect.width * state.dpr;
          canvas.height = rect.height * state.dpr;
          state.scale = Math.min(rect.width, rect.height) * 0.22;
          state.center = {
            x: rect.width * 0.5,
            y: rect.height * 0.52,
          };
          buildParticles();
          renderFrame(0);
        }

        function rotateY(p, angle) {
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          return {
            x: p.x * cos + p.z * sin,
            y: p.y,
            z: -p.x * sin + p.z * cos,
          };
        }

        function rotateX(p, angle) {
          const cos = Math.cos(angle);
          const sin = Math.sin(angle);
          return {
            x: p.x,
            y: p.y * cos - p.z * sin,
            z: p.y * sin + p.z * cos,
          };
        }

        function project(p) {
          const rotated = rotateY(rotateX(p, state.tilt), state.spin);
          const perspective = state.fov / (state.fov + rotated.z);
          return {
            x: state.center.x + rotated.x * state.scale * perspective,
            y: state.center.y - rotated.y * state.scale * perspective,
            z: rotated.z,
            p: perspective,
          };
        }

        function ellipsePoints(rx, rz, y, steps = 72) {
          const pts = [];
          for (let i = 0; i < steps; i += 1) {
            const t = (i / steps) * Math.PI * 2;
            pts.push({
              x: Math.cos(t) * rx,
              y,
              z: Math.sin(t) * rz,
            });
          }
          return pts;
        }

        function drawShape(points, fillStyle) {
          if (!points.length) return;
          ctx.beginPath();
          const first = project(points[0]);
          ctx.moveTo(first.x, first.y);
          for (let i = 1; i < points.length; i += 1) {
            const p = project(points[i]);
            ctx.lineTo(p.x, p.y);
          }
          ctx.closePath();
          ctx.fillStyle = fillStyle;
          ctx.fill();
        }

        function buildParticles() {
          const particles = [];
          const { brim, crown } = hat;
          const count = 2200;
          for (let i = 0; i < count; i += 1) {
            const region = Math.random();
            let base;
            if (region < 0.45) {
              const t = Math.random() * Math.PI * 2;
              const r = Math.sqrt(Math.random());
              base = {
                x: Math.cos(t) * brim.rx * r,
                y: (Math.random() - 0.5) * brim.thickness,
                z: Math.sin(t) * brim.rz * r,
              };
            } else if (region < 0.85) {
              const t = Math.random() * Math.PI * 2;
              base = {
                x: Math.cos(t) * crown.rx,
                y: Math.random() * crown.height,
                z: Math.sin(t) * crown.rz,
              };
            } else {
              const t = Math.random() * Math.PI * 2;
              const r = Math.sqrt(Math.random());
              base = {
                x: Math.cos(t) * crown.rx * r,
                y: crown.height,
                z: Math.sin(t) * crown.rz * r,
              };
            }
            particles.push({
              base,
              offset: {
                x: (Math.random() - 0.5) * 2.4,
                y: (Math.random() - 0.2) * 1.6,
                z: (Math.random() - 0.5) * 2.2,
              },
              swirl: Math.random() * Math.PI * 2,
              swirlSpeed: (Math.random() * 0.6 + 0.4) * (Math.random() > 0.5 ? 1 : -1),
              size: Math.random() * 1.2 + 0.4,
              hue: 350 + Math.random() * 10,
              alpha: Math.random() * 0.5 + 0.5,
              last: null,
              isOrbiter: false,
              orbitRadius: Math.random() * 0.6 + 0.3,
              orbitSpeed: Math.random() * 0.8 + 0.3,
              orbitPhase: Math.random() * Math.PI * 2,
            });
          }
          state.particles = particles;
          state.orbiters = particles.slice(0, 28);
        }

        function shapeDepth(points) {
          if (!points.length) return 0;
          let total = 0;
          for (const p of points) {
            const rotated = rotateY(rotateX(p, state.tilt), state.spin);
            total += rotated.z;
          }
          return total / points.length;
        }

        function hatGradients(bounds) {
          const { minX, maxX, minY, maxY } = bounds;
          const centerX = (minX + maxX) / 2;
          const centerY = (minY + maxY) / 2;
          const lightShift = Math.cos(state.spin) * 0.35;
          const gradTop = ctx.createRadialGradient(
            centerX + lightShift * (maxX - minX) * 0.25,
            centerY - (maxY - minY) * 0.2,
            (maxX - minX) * 0.1,
            centerX,
            centerY,
            (maxX - minX) * 0.65,
          );
          gradTop.addColorStop(0, "rgba(210, 40, 65, 0.95)");
          gradTop.addColorStop(0.6, "rgba(130, 20, 38, 0.95)");
          gradTop.addColorStop(1, "rgba(60, 8, 20, 0.95)");

          const gradSide = ctx.createLinearGradient(minX, centerY, maxX, centerY);
          gradSide.addColorStop(0, "rgba(60, 8, 18, 0.9)");
          gradSide.addColorStop(0.4, "rgba(140, 22, 40, 0.9)");
          gradSide.addColorStop(1, "rgba(45, 6, 16, 0.9)");

          const gradBrim = ctx.createLinearGradient(minX, centerY, maxX, centerY);
          gradBrim.addColorStop(0, "rgba(90, 12, 28, 0.95)");
          gradBrim.addColorStop(0.5, "rgba(180, 28, 50, 0.95)");
          gradBrim.addColorStop(1, "rgba(70, 8, 22, 0.95)");

          return { gradTop, gradSide, gradBrim };
        }

        function getBounds(points) {
          let minX = Infinity;
          let maxX = -Infinity;
          let minY = Infinity;
          let maxY = -Infinity;
          for (const p of points) {
            const proj = project(p);
            minX = Math.min(minX, proj.x);
            maxX = Math.max(maxX, proj.x);
            minY = Math.min(minY, proj.y);
            maxY = Math.max(maxY, proj.y);
          }
          return { minX, maxX, minY, maxY };
        }

        function drawHat() {
          const { brim, crown } = hat;
          const brimTop = ellipsePoints(brim.rx, brim.rz, 0, 90);
          const brimBottom = ellipsePoints(brim.rx * 0.96, brim.rz * 0.96, -brim.thickness, 90);
          const crownBase = ellipsePoints(crown.rx, crown.rz, 0, 90);
          const crownTop = ellipsePoints(crown.rx * 0.92, crown.rz * 0.92, crown.height, 90);

          const crownSide = [...crownBase, ...crownTop.slice().reverse()];
          const brimSide = [...brimTop, ...brimBottom.slice().reverse()];

          const bounds = getBounds([...brimTop, ...brimBottom, ...crownTop]);
          const { gradTop, gradSide, gradBrim } = hatGradients(bounds);

          const shapes = [
            { points: brimSide, fill: "rgba(40, 6, 14, 0.85)" },
            { points: crownSide, fill: gradSide },
            { points: brimTop, fill: gradBrim },
            { points: crownTop, fill: gradTop },
          ];

          shapes
            .sort((a, b) => shapeDepth(a.points) - shapeDepth(b.points))
            .forEach((shape) => drawShape(shape.points, shape.fill));

          const glow = ctx.createRadialGradient(
            bounds.minX + (bounds.maxX - bounds.minX) * 0.4,
            bounds.minY + (bounds.maxY - bounds.minY) * 0.1,
            0,
            bounds.minX + (bounds.maxX - bounds.minX) * 0.5,
            bounds.minY + (bounds.maxY - bounds.minY) * 0.4,
            (bounds.maxX - bounds.minX) * 0.6,
          );
          glow.addColorStop(0, "rgba(255, 120, 140, 0.25)");
          glow.addColorStop(1, "rgba(255, 120, 140, 0)");
          ctx.globalAlpha = 0.35 * state.hatOpacity;
          ctx.fillStyle = glow;
          ctx.beginPath();
          ctx.ellipse(
            state.center.x,
            state.center.y + state.scale * 0.02,
            state.scale * 1.8,
            state.scale * 1.1,
            0,
            0,
            Math.PI * 2,
          );
          ctx.fill();
          ctx.globalAlpha = 1;
        }

        function background() {
          const w = state.width;
          const h = state.height;
          const grad = ctx.createRadialGradient(w * 0.5, h * 0.3, w * 0.1, w * 0.5, h * 0.3, w * 0.65);
          grad.addColorStop(0, "#1a1d25");
          grad.addColorStop(0.55, "#0e1117");
          grad.addColorStop(1, "#07090d");
          ctx.fillStyle = grad;
          ctx.fillRect(0, 0, w, h);

          ctx.save();
          ctx.globalAlpha = 0.2;
          ctx.beginPath();
          ctx.ellipse(w * 0.5, h * 0.68, w * 0.28, h * 0.08, 0, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.fill();
          ctx.restore();
        }

        function drawParticles(progress, swirl) {
          ctx.save();
          ctx.globalCompositeOperation = "lighter";
          ctx.shadowBlur = 10;
          ctx.shadowColor = "rgba(255, 120, 140, 0.5)";

          for (const particle of state.particles) {
            const target = particle.base;
            let offset = {
              x: particle.offset.x * progress,
              y: particle.offset.y * progress,
              z: particle.offset.z * progress,
            };
            if (swirl > 0) {
              const angle = particle.swirl + swirl * particle.swirlSpeed;
              offset = {
                x: offset.x + Math.cos(angle) * 0.35,
                y: offset.y + Math.sin(angle * 1.4) * 0.12,
                z: offset.z + Math.sin(angle) * 0.35,
              };
            }

            if (particle.isOrbiter) {
              const orbitAngle = particle.orbitPhase + swirl * particle.orbitSpeed * 0.6;
              offset = {
                x: Math.cos(orbitAngle) * particle.orbitRadius,
                y: Math.sin(orbitAngle * 0.7) * particle.orbitRadius * 0.2 + 0.15,
                z: Math.sin(orbitAngle) * particle.orbitRadius,
              };
            }

            const pos = {
              x: target.x + offset.x,
              y: target.y + offset.y,
              z: target.z + offset.z,
            };
            const screen = project(pos);
            const size = particle.size * (0.7 + screen.p);
            const alpha = particle.alpha * (0.4 + progress * 0.6);
            ctx.fillStyle = `hsla(${particle.hue}, 90%, 65%, ${alpha})`;
            ctx.beginPath();
            ctx.arc(screen.x, screen.y, size, 0, Math.PI * 2);
            ctx.fill();

            if (particle.isOrbiter && particle.last) {
              ctx.strokeStyle = `rgba(255, 140, 160, 0.2)`;
              ctx.lineWidth = 1.1;
              ctx.beginPath();
              ctx.moveTo(particle.last.x, particle.last.y);
              ctx.lineTo(screen.x, screen.y);
              ctx.stroke();
            }
            particle.last = { x: screen.x, y: screen.y };
          }
          ctx.restore();
        }

        function updateSequence(dt) {
          if (state.phase === "idle") {
            state.hatOpacity += (1 - state.hatOpacity) * dt * 3;
            return;
          }

          state.phaseTime += dt;
          if (state.phase === "dissolve") {
            const t = Math.min(state.phaseTime / durations.dissolve, 1);
            state.hatOpacity = 1 - easeInOut(t);
            if (t >= 1) {
              state.phase = "swirl";
              state.phaseTime = 0;
            }
          } else if (state.phase === "swirl") {
            if (state.phaseTime >= durations.swirl) {
              state.phase = "reform";
              state.phaseTime = 0;
            }
          } else if (state.phase === "reform") {
            const t = Math.min(state.phaseTime / durations.reform, 1);
            state.hatOpacity = easeInOut(t);
            if (t >= 1) {
              state.phase = "idle";
              state.phaseTime = 0;
              state.orbiters.forEach((particle) => {
                particle.isOrbiter = true;
              });
            }
          }
        }

        function easeInOut(t) {
          return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
        }

        function renderFrame(dt) {
          ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
          background();

          if (state.hatOpacity > 0.02) {
            ctx.save();
            ctx.globalAlpha = state.hatOpacity;
            drawHat();
            ctx.restore();
          }

          let progress = 0;
          let swirl = 0;
          if (state.phase === "dissolve") {
            progress = easeInOut(state.phaseTime / durations.dissolve);
            swirl = state.phaseTime * 1.2;
          } else if (state.phase === "swirl") {
            progress = 1;
            swirl = state.phaseTime * 2.2;
          } else if (state.phase === "reform") {
            progress = 1 - easeInOut(state.phaseTime / durations.reform);
            swirl = state.phaseTime * 1.1;
          }

          if (progress > 0.01 || state.orbiters.length) {
            drawParticles(progress, swirl);
          }
        }

        function tick(time) {
          const dt = Math.min((time - state.lastTime) / 1000, 0.033);
          state.lastTime = time;

          state.spinSpeed += (state.targetSpeed - state.spinSpeed) * dt * 2.2;
          state.spin += state.spinSpeed * dt;
          updateSequence(dt);
          renderFrame(dt);
          if (!prefersReduced) requestAnimationFrame(tick);
        }

        function triggerEffect() {
          if (prefersReduced || state.phase !== "idle") return;
          state.phase = "dissolve";
          state.phaseTime = 0;
          state.targetSpeed = 0.18;
          state.orbiters.forEach((particle) => {
            particle.isOrbiter = false;
          });
          setTimeout(() => {
            state.targetSpeed = 0.55;
          }, 1200);
        }

        if (!prefersReduced) {
          frame.addEventListener("pointerenter", triggerEffect);
          frame.addEventListener("pointerdown", triggerEffect);
        }

        window.addEventListener("resize", resize);
        resize();
        if (!prefersReduced) {
          requestAnimationFrame(tick);
        } else {
          renderFrame(0);
        }
      })();
    </script>
  </body>
</html>

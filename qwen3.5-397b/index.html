<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fedora</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: radial-gradient(ellipse at center, #1a1a2e 0%, #0d0d14 50%, #000000 100%);
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .scene {
      position: relative;
      width: 300px;
      height: 300px;
      perspective: 1000px;
      cursor: pointer;
    }

    .hat-container {
      position: absolute;
      width: 100%;
      height: 100%;
      transform-style: preserve-3d;
      transition: transform 0.3s ease, opacity 0.5s ease;
    }

    .hat-container.spinning {
      animation: spin 8s linear infinite;
    }

    .hat-container.slowing {
      animation: spin 20s linear infinite;
    }

    .hat-container.dissolving {
      opacity: 0;
    }

    @keyframes spin {
      from { transform: rotateY(0deg); }
      to { transform: rotateY(360deg); }
    }

    .hat-svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 20px 40px rgba(0, 0, 0, 0.5))
              drop-shadow(0 5px 15px rgba(200, 50, 50, 0.3));
    }

    .hat-gradient {
      stop-color: #cc0000;
    }

    .hat-highlight {
      stop-color: #ff4444;
    }

    .hat-shadow {
      stop-color: #880000;
    }

    .band-dark {
      stop-color: #1a1a1a;
    }

    .band-light {
      stop-color: #333333;
    }

    #particle-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .caption {
      margin-top: 60px;
      color: #888;
      font-size: 14px;
      letter-spacing: 3px;
      text-transform: uppercase;
      opacity: 0.7;
      transition: opacity 0.3s ease;
    }

    .scene:hover + .caption,
    .scene:active + .caption {
      opacity: 0.4;
    }

    @media (prefers-reduced-motion: reduce) {
      .hat-container.spinning,
      .hat-container.slowing {
        animation: none;
      }
    }

    @media (max-width: 400px) {
      .scene {
        width: 200px;
        height: 200px;
      }
      .caption {
        font-size: 11px;
        margin-top: 40px;
      }
    }
  </style>
</head>
<body>
  <canvas id="particle-canvas"></canvas>
  
  <div class="scene" id="scene">
    <div class="hat-container spinning" id="hat">
      <svg class="hat-svg" viewBox="0 0 200 150" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="crownGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" class="hat-highlight"/>
            <stop offset="30%" class="hat-gradient"/>
            <stop offset="100%" class="hat-shadow"/>
          </linearGradient>
          <linearGradient id="brimGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="hat-shadow"/>
            <stop offset="50%" class="hat-gradient"/>
            <stop offset="100%" class="hat-shadow"/>
          </linearGradient>
          <linearGradient id="bandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" class="band-light"/>
            <stop offset="50%" class="band-dark"/>
            <stop offset="100%" class="band-light"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
            <feMerge>
              <feMergeNode in="coloredBlur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        
        <!-- Brim (back) -->
        <ellipse cx="100" cy="110" rx="90" ry="25" fill="url(#brimGrad)" opacity="0.9"/>
        
        <!-- Crown -->
        <path d="M 50 110 L 50 60 Q 50 30 100 30 Q 150 30 150 60 L 150 110 Z" 
              fill="url(#crownGrad)" filter="url(#glow)"/>
        
        <!-- Crown top curve -->
        <ellipse cx="100" cy="35" rx="45" ry="12" fill="url(#crownGrad)" opacity="0.8"/>
        
        <!-- Band -->
        <rect x="50" y="85" width="100" height="15" rx="3" fill="url(#bandGrad)"/>
        
        <!-- Brim (front) -->
        <ellipse cx="100" cy="110" rx="90" ry="25" fill="url(#brimGrad)"/>
        
        <!-- Brim highlight -->
        <ellipse cx="100" cy="105" rx="70" ry="15" fill="none" stroke="#ff6666" 
                 stroke-width="1" opacity="0.3"/>
      </svg>
    </div>
  </div>
  
  <p class="caption">Fedora</p>

  <script>
    (function() {
      const canvas = document.getElementById('particle-canvas');
      const ctx = canvas.getContext('2d');
      const hat = document.getElementById('hat');
      const scene = document.getElementById('scene');
      
      let particles = [];
      let animationId = null;
      let isDissolving = false;
      let isReforming = false;
      let hatPosition = { x: 0, y: 0 };
      
      const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      
      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        updateHatPosition();
      }
      
      function updateHatPosition() {
        const rect = scene.getBoundingClientRect();
        hatPosition.x = rect.left + rect.width / 2;
        hatPosition.y = rect.top + rect.height / 2;
      }
      
      window.addEventListener('resize', resize);
      resize();
      
      class Particle {
        constructor(x, y, isOrbiter = false) {
          this.x = x;
          this.y = y;
          this.originX = x;
          this.originY = y;
          this.size = Math.random() * 3 + 1;
          this.color = `hsla(${Math.random() * 30 + 345}, 80%, ${Math.random() * 30 + 50}%,`;
          this.alpha = Math.random() * 0.5 + 0.5;
          this.velocity = {
            x: (Math.random() - 0.5) * 8,
            y: (Math.random() - 0.5) * 8 - 2
          };
          this.friction = 0.96;
          this.gravity = 0.03;
          this.isOrbiter = isOrbiter;
          this.orbitAngle = Math.random() * Math.PI * 2;
          this.orbitSpeed = (Math.random() - 0.5) * 0.02;
          this.orbitRadius = Math.random() * 150 + 100;
          this.trail = [];
          this.maxTrailLength = isOrbiter ? 20 : 5;
        }
        
        update(phase) {
          if (phase === 'dissolve') {
            this.velocity.x *= this.friction;
            this.velocity.y *= this.friction;
            this.velocity.y += this.gravity;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha -= 0.003;
          } else if (phase === 'swirl') {
            const angle = Math.atan2(this.y - hatPosition.y, this.x - hatPosition.x);
            const swirlForce = 0.08;
            this.velocity.x += Math.cos(angle + Math.PI / 2) * swirlForce;
            this.velocity.y += Math.sin(angle + Math.PI / 2) * swirlForce;
            this.velocity.x *= 0.95;
            this.velocity.y *= 0.95;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
          } else if (phase === 'reform') {
            const dx = this.originX - this.x;
            const dy = this.originY - this.y;
            this.velocity.x += dx * 0.03;
            this.velocity.y += dy * 0.03;
            this.velocity.x *= 0.92;
            this.velocity.y *= 0.92;
            this.x += this.velocity.x;
            this.y += this.velocity.y;
            this.alpha = Math.min(1, this.alpha + 0.02);
          } else if (phase === 'orbit' && this.isOrbiter) {
            this.orbitAngle += this.orbitSpeed;
            this.x = hatPosition.x + Math.cos(this.orbitAngle) * this.orbitRadius;
            this.y = hatPosition.y + Math.sin(this.orbitAngle) * (this.orbitRadius * 0.4);
            this.alpha = 0.3 + Math.sin(this.orbitAngle * 3) * 0.2;
          }
          
          // Update trail
          if (this.isOrbiter || phase === 'dissolve') {
            this.trail.push({ x: this.x, y: this.y, alpha: this.alpha });
            if (this.trail.length > this.maxTrailLength) {
              this.trail.shift();
            }
          }
        }
        
        draw() {
          // Draw trail
          for (let i = 0; i < this.trail.length; i++) {
            const point = this.trail[i];
            const trailAlpha = (i / this.trail.length) * this.alpha * 0.3;
            ctx.beginPath();
            ctx.arc(point.x, point.y, this.size * (i / this.trail.length), 0, Math.PI * 2);
            ctx.fillStyle = this.color + trailAlpha + ')';
            ctx.fill();
          }
          
          // Draw particle
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fillStyle = this.color + this.alpha + ')';
          ctx.fill();
          
          // Glow effect
          if (this.size > 2) {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
            ctx.fillStyle = this.color + (this.alpha * 0.2) + ')';
            ctx.fill();
          }
        }
      }
      
      function createParticles() {
        particles = [];
        const hatRect = scene.getBoundingClientRect();
        const centerX = hatRect.left + hatRect.width / 2;
        const centerY = hatRect.top + hatRect.height / 2;
        
        // Create thousands of particles from hat area
        for (let i = 0; i < 3000; i++) {
          const angle = Math.random() * Math.PI * 2;
          const radius = Math.random() * 80;
          const x = centerX + Math.cos(angle) * radius;
          const y = centerY + Math.sin(angle) * radius * 0.6 - 20;
          particles.push(new Particle(x, y));
        }
        
        // Mark some as orbiters
        for (let i = 0; i < 50; i++) {
          particles[i].isOrbiter = true;
        }
      }
      
      function animate(phase) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // Additive blending for glow effect
        ctx.globalCompositeOperation = 'lighter';
        
        particles.forEach(p => {
          p.update(phase);
          p.draw();
        });
        
        ctx.globalCompositeOperation = 'source-over';
        
        // Remove faded particles in dissolve phase
        if (phase === 'dissolve') {
          particles = particles.filter(p => p.alpha > 0.05);
        }
        
        if (particles.length > 0 || phase === 'orbit') {
          animationId = requestAnimationFrame(() => animate(phase));
        } else if (phase === 'reform') {
          // Start orbit phase
          startOrbitPhase();
        }
      }
      
      function startOrbitPhase() {
        particles = particles.filter(p => p.isOrbiter);
        if (particles.length > 0) {
          animate('orbit');
        }
      }
      
      function triggerEffect() {
        if (isDissolving || isReforming || prefersReducedMotion) return;
        
        isDissolving = true;
        
        // Slow down spin
        hat.classList.remove('spinning');
        hat.classList.add('slowing');
        
        // Create particles
        createParticles();
        
        // Dissolve phase
        setTimeout(() => {
          hat.classList.add('dissolving');
          hat.classList.remove('slowing');
          animate('dissolve');
        }, 500);
        
        // Swirl phase
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          animate('swirl');
        }, 2000);
        
        // Reform phase
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          hat.classList.remove('dissolving');
          isReforming = true;
          animate('reform');
        }, 4000);
        
        // Back to normal
        setTimeout(() => {
          cancelAnimationFrame(animationId);
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          hat.classList.add('spinning');
          isDissolving = false;
          isReforming = false;
          
          // Start orbit phase with remaining particles
          startOrbitPhase();
        }, 5500);
      }
      
      let touchTimeout;
      
      scene.addEventListener('mouseenter', () => {
        if (!prefersReducedMotion) {
          touchTimeout = setTimeout(triggerEffect, 300);
        }
      });
      
      scene.addEventListener('mouseleave', () => {
        clearTimeout(touchTimeout);
      });
      
      scene.addEventListener('touchstart', (e) => {
        e.preventDefault();
        if (!prefersReducedMotion) {
          triggerEffect();
        }
      });
      
      scene.addEventListener('click', () => {
        if (!prefersReducedMotion && !isDissolving) {
          triggerEffect();
        }
      });
    })();
  </script>
</body>
</html>

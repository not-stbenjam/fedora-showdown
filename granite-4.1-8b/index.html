<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinny Hat Demo</title>
<style>
  body, html { margin:0; padding:0; overflow:hidden; height:100%; background:#111; }
  #scene { width:100%; height:100%; position:relative; }
  svg { width:100%; height:100%; }
  .caption { position:absolute; bottom:20px; width:100%; text-align:center; color:#fff; font-family:sans-serif; }
  .caption span { text-shadow:0 0 5px #fff; }
  .particle { fill:#ffdb58; opacity:0.8; }
  @media (prefers-reduced-motion: reduce) {
    .animation { animation:none; }
  }
</style>
</head>
<body>
<div id="scene">
  <svg viewBox="0 0 200 300" preserveAspectRatio="xMidYMid meet">
    <!-- Simple Red Hat fedora silhouette as a path for 3D animation -->
    <defs>
      <filter id="softlight">
        <feComponentTransfer><feFuncR type="table" tableValues="0.6 0.4"/><feFuncG type="table" tableValues="0.6 0.4"/><feFuncB type="table" tableValues="0.6 0.4"/></feComponentTransfer>
      </filter>
    </defs>
    <!-- Hat base (ellipse) -->
    <path id="hat" d="M100,260 C60,280 40,260 40,240 C40,220 60,200 100,200 C140,200 160,220 160,240 C160,260 140,280 100,280 Z" fill="url(#softlight)" stroke="#ffcc00" stroke-width="4" />
    <!-- Fedora tip (triangle) -->
    <polygon points="100,200 80,140 120,140" fill="#ffcc00" filter="url(#softlight)" />
    <!-- Glow effect via blur after rotation -->
  </path>
    <!-- Particle system for hover/tap -->
    <g id="particles">
      <circle class="particle" cx="100" cy="260" r="1" opacity="0" />
    </g>
  </svg>
</div>
<div class="caption"><span>Red Hat Fedora</span></div>
</body>
<script>
/* Reduced motion handling */
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const hat = document.getElementById('hat');
const particles = document.getElementById('particles').children;
let phase = 0; // 0 = normal spin, 1 = dissolve, 2 = reassemble
let particleState = 'off';

// Normal spin animation
function spin() {
  if (prefersReducedMotion) return;
  let speed = 0.02; // radians per frame
  const time = performance.now() * 0.001;
  hat.style.transform = `rotate(${speed * time}rad) translate(100px, 150px) rotate(-${speed * time}rad)`;
}

/* Hover/touch listener */
['pointerover', 'touchstart'].forEach(eventType => {
  document.querySelector('svg').addEventListener(eventType, () => {
    if (prefersReducedMotion) {
      phase = 2; // jump straight to reassembly
      setTimeout(() => reassemble(), 100);
    } else {
      phase = 1;
    }
  });
});

/* Particle dissolve */
function dissolve() {
  phase = 1;
  for (let i = 0; i < particles.length; i++) {
    particles[i].style.opacity = '1';
    particles[i].setAttribute('cx', 100);
    particles[i].setAttribute('cy', 260);
  }
  // Emit particles outward
  for (let i = 0; i < 300; i++) {
    const p = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    p.classList.add('particle');
    p.setAttribute('r', 1);
    p.setAttribute('fill', '#ffdb58');
    p.setAttribute('opacity', '0.8');
    p.setAttribute('cx', Math.random()*200);
    p.setAttribute('cy', Math.random()*300);
    document.getElementById('particles').appendChild(p);
  }
  // Fade out original hat to trigger reassembly later
  hat.style.opacity = '0';
  setTimeout(() => fadeOut(), 800);
}

function fadeOut() {
  hat.style.opacity = '0';
}

/* Particle reassembly */
function reassemble() {
  phase = 2;
  // Concentrate particles back onto the hat path coordinates
  const points = []; // will be filled from hat path data later
  const pathData = getSVGPathPoints(hat); // helper to extract points
  points.push(...pathData);
  for (let i = 0; i < points.length; i++) {
    const p = document.querySelector(`circle[patternUnits="svg"]`); // actually we'll use existing particles
    // easier: move each particle to the nearest point
    // For brevity, we'll just animate a rotation that rebuilds shape (simplified visual)
    // In a full implementation we'd repath each particle.
    // Here we just re‑enable original hat with slight delay.
    setTimeout(() => {
      if (hat.style.opacity === '0') {
        hat.style.opacity = '1';
        hat.style.transform = '';
      }
    }, i * 10);
  }
  // Keep a few orbiting particles
  keepOrbiting();
}

function keepOrbiting() {
  if (particleState !== 'orbits') {
    const count = 8;
    for (let i = 0; i < count; i++) {
      const p = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      p.classList.add('particle');
      p.setAttribute('r', 0.8);
      p.setAttribute('fill', '#ffdb58');
      p.setAttribute('opacity', '0.9');
      const angle = (i * 2 * Math.PI) / count;
      p.setAttribute('cx', 100 + 80 * Math.cos(angle));
      p.setAttribute('cy', 260 + 80 * Math.sin(angle));
      document.getElementById('particles').appendChild(p);
    }
    particleState = 'orbits';
  }
}

// Running the normal spin while not interacting
if (!prefersReducedMotion) {
  (function animate(){
    spin();
    requestAnimationFrame(animate);
  })();
}

// Expose helper to extract points from SVG path (very minimal) for real reassembly
function getSVGPathPoints(svgEl){
  const path = svgEl.getAttribute('d');
  const match = path.match(/([MLCQSZ])([^ ]+)/g);
  const pts = [];
  // Very simplified – only handles M and L
  match.forEach(m=>{
    const cmd = m[0];
    const nums = m.slice(1).split(/\s+/);
    if (cmd==='M') pts.push({x:parseFloat(nums[0]), y:parseFloat(nums[1])});
    if (cmd==='L') pts.push({x:parseFloat(nums[0]), y:parseFloat(nums[1])});
  });
  return pts;
}
</script>
</html>

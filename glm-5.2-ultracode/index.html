<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Red Hat — Papercraft Fedora</title>
<style>
  :root{
    --ink:#0d0a09;
    --ink-2:#16100e;
    --cream:#f3ead7;
    --red:#c8261e;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;background:var(--ink);overflow:hidden;}
  body{
    font-family:"Helvetica Neue",Arial,Helvetica,sans-serif;
    color:var(--cream);
    -webkit-font-smoothing:antialiased;
    touch-action:none;
  }
  .stage{
    position:fixed;inset:0;
    background:
      radial-gradient(120% 90% at 50% 38%, #1a1310 0%, #100c0a 55%, #070504 100%);
  }
  #c{position:absolute;inset:0;width:100%;height:100%;display:block;}
  .caption{
    position:absolute;left:0;right:0;bottom:8vh;
    text-align:center;pointer-events:none;
    z-index:2;
  }
  .caption .bar{
    width:clamp(40px,9vw,86px);height:3px;background:var(--red);
    margin:0 auto clamp(10px,2.2vh,18px);
    box-shadow:0 0 18px rgba(200,38,30,.55);
  }
  .caption h1{
    font-weight:900;
    font-size:clamp(30px,7.4vw,76px);
    letter-spacing:clamp(2px,1.1vw,12px);
    line-height:.92;
    color:var(--cream);
    text-indent:clamp(2px,1.1vw,12px);
  }
  .caption p{
    margin-top:clamp(8px,1.8vh,16px);
    font-size:clamp(10px,1.5vw,13px);
    letter-spacing:clamp(2px,.7vw,6px);
    font-weight:600;
    color:rgba(243,234,215,.52);
    text-transform:uppercase;
  }
  .caption p b{color:var(--red);font-weight:700;}
  .corner{
    position:absolute;font-size:10px;letter-spacing:3px;font-weight:700;
    color:rgba(243,234,215,.32);text-transform:uppercase;z-index:2;pointer-events:none;
  }
  .corner.tl{top:18px;left:20px;}
  .corner.tr{top:18px;right:20px;}
  @media (max-width:560px){
    .corner{display:none;}
    .caption{bottom:6vh;}
  }
</style>
</head>
<body>
<div class="stage">
  <canvas id="c"></canvas>
  <div class="corner tl">Papercraft / Vol.01</div>
  <div class="corner tr">Red + Ink + Cream</div>
  <div class="caption">
    <div class="bar"></div>
    <h1>RED&nbsp;HAT</h1>
    <p>paper-craft fedora &nbsp;·&nbsp; <b>hover</b> to dissolve &nbsp;·&nbsp; <b>tap</b> to reform</p>
  </div>
</div>

<script>
"use strict";
(function(){
  // ------------------------------------------------------------------ math
  function v3(x,y,z){return {x:x,y:y,z:z};}
  function vadd(a,b){return {x:a.x+b.x,y:a.y+b.y,z:a.z+b.z};}
  function vsub(a,b){return {x:a.x-b.x,y:a.y-b.y,z:a.z-b.z};}
  function vscale(a,s){return {x:a.x*s,y:a.y*s,z:a.z*s};}
  function vcross(a,b){return {x:a.y*b.z-a.z*b.y, y:a.z*b.x-a.x*b.z, z:a.x*b.y-a.y*b.x};}
  function vdot(a,b){return a.x*b.x+a.y*b.y+a.z*b.z;}
  function vlen(a){return Math.sqrt(vdot(a,a));}
  function vnorm(a){var l=vlen(a)||1;return vscale(a,1/l);}
  // row-major 3x3
  function matIdent(){return [1,0,0,0,1,0,0,0,1];}
  function matRy(a){var c=Math.cos(a),s=Math.sin(a);return [c,0,-s,0,1,0,s,0,c];}
  function matRx(a){var c=Math.cos(a),s=Math.sin(a);return [1,0,0,0,c,-s,0,s,c];}
  function matAxis(axis,ang){
    var c=Math.cos(ang),s=Math.sin(ang),t=1-c;
    var x=axis.x,y=axis.y,z=axis.z;
    return [
      t*x*x+c,   t*x*y-s*z, t*x*z+s*y,
      t*x*y+s*z, t*y*y+c,   t*y*z-s*x,
      t*x*z-s*y, t*y*z+s*x, t*z*z+c
    ];
  }
  function matMul(a,b){
    var r=new Array(9);
    for(var i=0;i<3;i++){
      for(var j=0;j<3;j++){
        r[i*3+j]=a[i*3]*b[j]+a[i*3+1]*b[3+j]+a[i*3+2]*b[6+j];
      }
    }
    return r;
  }
  function mApply(m,v){
    return v3(
      m[0]*v.x+m[1]*v.y+m[2]*v.z,
      m[3]*v.x+m[4]*v.y+m[5]*v.z,
      m[6]*v.x+m[7]*v.y+m[8]*v.z
    );
  }
  function clamp(x,a,b){return x<a?a:(x>b?b:x);}
  function lerp(a,b,t){return a+(b-a)*t;}
  function easeInOutCubic(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
  function easeOutCubic(t){return 1-Math.pow(1-t,3);}
  function easeOutBack(t){var c1=1.4,c3=c1+1;return 1+c3*Math.pow(t-1,3)+c1*Math.pow(t-1,2);}

  // ------------------------------------------------------------------ canvas
  var canvas=document.getElementById('c');
  var ctx=canvas.getContext('2d');
  var DPR=1,W=0,H=0,CX=0,CY=0,SCR=1;
  function resize(){
    DPR=Math.min(window.devicePixelRatio||1,2.5);
    W=window.innerWidth;H=window.innerHeight;
    canvas.width=Math.floor(W*DPR);
    canvas.height=Math.floor(H*DPR);
    canvas.style.width=W+'px';
    canvas.style.height=H+'px';
    ctx.setTransform(DPR,0,0,DPR,0,0);
    CX=W/2;CY=H*0.46;
    SCR=Math.min(W,H)*0.42;
  }
  window.addEventListener('resize',resize);
  resize();

  // ------------------------------------------------------------------ palette
  // cel bands: 2 bright, 1 mid, 0 deep, back
  var PAL={
    crown: {2:'#f0533a',1:'#c8261e',0:'#8e1815',back:'#430a08'},
    cap:   {2:'#e84a36',1:'#bb211b',0:'#7d1310',back:'#3a0a07'},
    band:  {2:'#2e1813',1:'#1c0f0c',0:'#120907',back:'#0a0504'},
    brimT: {2:'#d9392a',1:'#ad1f1a',0:'#761310',back:'#340806'},
    brimB: {2:'#3a1a16',1:'#24100d',0:'#150907',back:'#0a0504'},
    rim:   {2:'#7a1410',1:'#560d0a',0:'#3a0806',back:'#1c0403'}
  };
  function shade(pal,nd){
    if(nd>0.62) return pal[2];
    if(nd>0.20) return pal[1];
    if(nd>-0.22) return pal[0];
    return pal.back;
  }
  var LIGHT=vnorm(v3(-0.38,0.78,0.50));

  // ------------------------------------------------------------------ mesh
  var NSEG=11; // odd -> front vertex for crease
  var verts=[];     // local-space {x,y,z}
  var faces=[];     // {a,b,c, pal, region, n:normal(local)}
  function pushV(x,y,z){verts.push(v3(x,y,z));return verts.length-1;}
  function pushFace(a,b,c,pal){
    var A=verts[a],B=verts[b],C=verts[c];
    var n=vnorm(vcross(vsub(B,A),vsub(C,A)));
    faces.push({a:a,b:b,c:c,pal:pal,n:n});
  }

  (function buildHat(){
    var TWOPI=Math.PI*2;
    // crown rings: bottom, mid, top (with crease profile)
    var rings=[];
    var levels=[
      {y:0.00,r:0.60, dent:0.00, yoff:0.00},
      {y:0.46,r:0.50, dent:0.00, yoff:0.00},
      {y:0.92,r:0.405,dent:0.00, yoff:0.00}
    ];
    for(var li=0;li<levels.length;li++){
      var lv=levels[li];var ring=[];
      for(var i=0;i<NSEG;i++){
        var th=TWOPI*i/NSEG - Math.PI/2; // -pi/2 => front (+z) center? we'll treat +z as front
        // use angle so that th=0 is +x; front we want +z. Let th measured from +z.
        var ang=TWOPI*i/NSEG; // 0 => +z front
        var cT=Math.cos(ang),sT=Math.sin(ang);
        var r=lv.r;
        var yy=lv.y;
        // side dents on mid ring at sides (ang ~ pi/2, 3pi/2)
        if(li===1){
          var sd=Math.pow(Math.abs(Math.sin(ang)),3.0);
          r-=0.07*sd;
          yy-=0.035*sd;
        }
        // top crease: lower along front-back line (ang 0, pi), higher at sides
        if(li===2){
          var cf=Math.abs(Math.cos(ang));
          yy-=0.10*cf;          // crease valley front-back
          yy+=0.05*Math.abs(Math.sin(ang)); // peaks at sides
          r-=0.05*cf;           // pinch front-back
        }
        ring.push(pushV(r*Math.sin(ang), yy, r*Math.cos(ang)));
      }
      rings.push(ring);
    }
    // crown side bands
    for(li=0;li<rings.length-1;li++){
      var R0=rings[li],R1=rings[li+1];
      for(i=0;i<NSEG;i++){
        var i0=R0[i],i1=R0[(i+1)%NSEG],i2=R1[(i+1)%NSEG],i3=R1[i];
        pushFace(i0,i3,i2,PAL.crown);
        pushFace(i0,i2,i1,PAL.crown);
      }
    }
    // top cap: fan from centroid to top ring (closes pinched dome)
    var topRing=rings[rings.length-1];
    var cy=0;for(i=0;i<NSEG;i++)cy+=verts[topRing[i]].y;cy/=NSEG;
    var capCenter=pushV(0,cy+0.02,0);
    for(i=0;i<NSEG;i++){
      pushFace(capCenter,topRing[i],topRing[(i+1)%NSEG],PAL.cap);
    }

    // hat band (slightly proud ring near base)
    var bandH0=0.04,bandH1=0.165,bandR=0.612;
    var b0=[],b1=[];
    for(i=0;i<NSEG;i++){
      ang=TWOPI*i/NSEG;
      b0.push(pushV(bandR*Math.sin(ang),bandH0,bandR*Math.cos(ang)));
      b1.push(pushV(bandR*Math.sin(ang),bandH1,bandR*Math.cos(ang)));
    }
    for(i=0;i<NSEG;i++){
      var j=(i+1)%NSEG;
      pushFace(b0[i],b0[j],b1[j],PAL.band);
      pushFace(b0[i],b1[j],b1[i],PAL.band);
    }

    // brim: oval, top + bottom + outer rim, with front/back curl down
    var brimIn=0.605, brimOutA=1.18, brimOutB=1.00, thick=0.075;
    var bInT=[],bOutT=[],bInB=[],bOutB=[];
    for(i=0;i<NSEG;i++){
      ang=TWOPI*i/NSEG;
      var sA=Math.sin(ang),cA=Math.cos(ang);
      var curl=Math.pow(Math.abs(Math.cos(ang)),2.2); // front/back down
      var yT=-0.05-0.16*curl;
      var oxs=brimOutA*sA, oxc=brimOutB*cA;
      var ixs=brimIn*sA, ixc=brimIn*cA;
      bInT.push(pushV(ixs,yT,ixc));
      bOutT.push(pushV(oxs,yT,oxc));
      bInB.push(pushV(ixs,yT-thick,ixc));
      bOutB.push(pushV(oxs,yT-thick,oxc));
    }
    for(i=0;i<NSEG;i++){
      j=(i+1)%NSEG;
      // top surface (outer normal up)
      pushFace(bInT[i],bOutT[i],bOutT[j],PAL.brimT);
      pushFace(bInT[i],bOutT[j],bInT[j],PAL.brimT);
      // bottom surface (down)
      pushFace(bInB[i],bOutB[j],bOutB[i],PAL.brimB);
      pushFace(bInB[i],bInB[j],bOutB[j],PAL.brimB);
      // outer rim (curl edge)
      pushFace(bOutT[i],bOutB[i],bOutB[j],PAL.rim);
      pushFace(bOutT[i],bOutB[j],bOutT[j],PAL.rim);
    }

    // recompute normals (already done per-face) — nothing else
  })();

  // ground shadow polygon (brim outer outline projected to ground)
  var shadowPoly=[];
  (function(){
    // find outer top brim verts: those with max radius ~ index scan
    // simpler: reuse bOutT-like points by scanning verts with y near -0.05 and large radius
    // We'll just build an ellipse polygon matching brim outer.
    for(var i=0;i<48;i++){
      var ang=Math.PI*2*i/48;
      shadowPoly.push({x:1.18*Math.sin(ang),z:1.00*Math.cos(ang)});
    }
  })();
  var GROUND_Y=-0.13;

  // ------------------------------------------------------------------ projection
  var CAMDIST=3.45, FOCAL=2.7;
  function project(v){
    var zc=v.z+CAMDIST;
    if(zc<0.06) zc=0.06;
    var s=FOCAL/zc;
    return {x:v.x*s, y:-v.y*s, z:zc, s:s};
  }
  function toScreen(p){return {x:CX+p.x*SCR, y:CY+p.y*SCR, z:p.z, s:p.s};}

  // ------------------------------------------------------------------ particles
  var PCOUNT=1400;
  var particles=new Array(PCOUNT);
  // cumulative area for weighted pick
  var cumArea=new Array(faces.length+1);
  (function sample(){
    var total=0;
    cumArea[0]=0;
    for(var f=0;f<faces.length;f++){
      var A=verts[faces[f].a],B=verts[faces[f].b],C=verts[faces[f].c];
      var area=vlen(vcross(vsub(B,A),vsub(C,A)))*0.5;
      total+=area;
      cumArea[f+1]=total;
    }
    function pickTri(){
      var r=Math.random()*total;
      var lo=0,hi=faces.length-1;
      while(lo<hi){var mid=(lo+hi)>>1; if(cumArea[mid+1]<r)lo=mid+1; else hi=mid;}
      return lo;
    }
    function bary(A,B,C){
      var r1=Math.random(),r2=Math.random();
      if(r1+r2>1){r1=1-r1;r2=1-r2;}
      var a=1-r1-r2,b=r1,c=r2;
      return v3(
        a*A.x+b*B.x+c*C.x,
        a*A.y+b*B.y+c*C.y,
        a*A.z+b*B.z+c*C.z
      );
    }
    for(var i=0;i<PCOUNT;i++){
      var fi=pickTri();
      var fc=faces[fi];
      var A=verts[fc.a],B=verts[fc.b],C=verts[fc.c];
      var home=bary(A,B,C);
      var nd=vdot(fc.n,LIGHT);
      var col=shade(fc.pal,nd);
      particles[i]={
        home:home,
        color:col,
        size:0.018+Math.random()*0.026,
        world:v3(home.x,home.y,home.z),
        vel:v3(0,0,0),
        orient:matIdent(),
        ang:v3(Math.random()-0.5,Math.random()-0.5,Math.random()-0.5),
        angVel:0.6+Math.random()*2.4,
        phase:0
      };
      var ax=particles[i].ang;
      particles[i].ang=vnorm(ax);
    }
  })();

  // ambient orbiters (persistent after first interaction)
  var OCOUNT=16;
  var orbiters=new Array(OCOUNT);
  (function(){
    for(var i=0;i<OCOUNT;i++){
      var ang=Math.random()*Math.PI*2;
      var rad=0.95+Math.random()*0.55;
      var tilt=(Math.random()-0.5)*1.4;
      var yb=(Math.random()-0.5)*0.9;
      orbiters[i]={
        ang:ang,rad:rad,tilt:tilt,yb:yb,
        speed:(0.25+Math.random()*0.5)*(Math.random()<0.5?-1:1),
        size:0.016+Math.random()*0.02,
        color:Math.random()<0.5?'#ff6a4d':'#e8402f',
        trail:new Array(7),
        tp:0,active:false
      };
      for(var t=0;t<7;t++)orbiters[i].trail[t]=v3(0,0,0);
    }
  })();
  var orbitersActive=false;

  // ------------------------------------------------------------------ state
  var STATE={MESH:0,DISSOLVE:1,REFORM:2};
  var phase=STATE.MESH;
  var phaseT=0;
  var DISSOLVE_DUR=1.9, REFORM_DUR=1.5;
  var spin=0.6, spinSpeed=0.5, spinTarget=0.5;
  var viewTilt=0.20;
  var meshAlpha=1, partAlpha=0;
  var lastT=performance.now()/1000;
  var triggered=false;

  // reduced motion (live listener)
  var reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var mq=window.matchMedia('(prefers-reduced-motion: reduce)');
  function onMQ(e){reduced=e.matches;}
  if(mq.addEventListener)mq.addEventListener('change',onMQ);
  else if(mq.addListener)mq.addListener(onMQ);
  if(reduced){spinSpeed=0;spinTarget=0;spin=0.0;}

  // ------------------------------------------------------------------ interaction
  function trigger(){
    if(phase!==STATE.MESH){
      // allow re-trigger: jump to reform from current positions
      phase=STATE.REFORM;phaseT=0;
      return;
    }
    phase=STATE.DISSOLVE;phaseT=0;
    // compute current rotation
    var R=matMul(matRx(viewTilt),matRy(spin));
    for(var i=0;i<PCOUNT;i++){
      var p=particles[i];
      var h=mApply(R,p.home);
      p.world=v3(h.x,h.y,h.z);
      var outdir=vnorm(v3(h.x*0.7+ (Math.random()-0.5), h.y+0.2+(Math.random()-0.5)*0.4, h.z*0.7+(Math.random()-0.5)));
      var burst=0.7+Math.random()*0.9;
      p.vel=v3(outdir.x*burst+(Math.random()-0.5)*0.4,
               outdir.y*burst*0.5+0.25+Math.random()*0.3,
               outdir.z*burst+(Math.random()-0.5)*0.4);
      if(reduced){ // gentle: small displacement, little gravity
        p.vel=vscale(p.vel,0.25);
      }
      p.orient=matIdent();
      p.angVel=0.4+Math.random()*1.8;
    }
    triggered=true;
    spinTarget=reduced?0:0.07;
  }
  function beginOrbiters(){
    if(orbitersActive)return;
    orbitersActive=true;
    var R=matMul(matRx(viewTilt),matRy(spin));
    for(var i=0;i<OCOUNT;i++){
      var o=orbiters[i];
      o.active=true;
      // seed position on orbit
      var local=v3(Math.cos(o.ang)*o.rad, o.yb, Math.sin(o.ang)*o.rad);
      var w=mApply(R,local);
      o.world=w;
      for(var t=0;t<7;t++)o.trail[t]=v3(w.x,w.y,w.z);
    }
  }
  // hover (desktop) / tap (touch)
  var stage=document.querySelector('.stage');
  stage.addEventListener('pointerenter',function(){if(!reduced&&phase===STATE.MESH)trigger();});
  stage.addEventListener('pointerdown',function(){
    if(reduced){trigger();return;}
    if(phase===STATE.MESH)trigger();
    else if(phase===STATE.DISSOLVE){phase=STATE.REFORM;phaseT=0;}
  });

  // ------------------------------------------------------------------ rendering helpers
  function pathTri(ctx,p0,p1,p2){
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.closePath();
  }
  function pathQuad(ctx,p0,p1,p2,p3){
    ctx.beginPath();
    ctx.moveTo(p0.x,p0.y);
    ctx.lineTo(p1.x,p1.y);
    ctx.lineTo(p2.x,p2.y);
    ctx.lineTo(p3.x,p3.y);
    ctx.closePath();
  }
  function hexA(hex,a){
    // hex #rrggbb -> rgba string
    var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return 'rgba('+r+','+g+','+b+','+a+')';
  }

  // ------------------------------------------------------------------ main loop
  function frame(now){
    var t=now/1000;
    var dt=Math.min(0.033,Math.max(0.001,t-lastT));
    lastT=t;

    // spin
    spinSpeed+=(spinTarget-spinSpeed)*Math.min(1,dt*6);
    spin+=spinSpeed*dt;
    var R=matMul(matRx(viewTilt),matRy(spin));

    // phase timing
    if(phase===STATE.DISSOLVE){
      phaseT+=dt/DISSOLVE_DUR;
      if(phaseT>=1){phaseT=1;phase=STATE.REFORM;phaseT=0;}
    } else if(phase===STATE.REFORM){
      phaseT+=dt/REFORM_DUR;
      if(phaseT>=1){
        phaseT=1;phase=STATE.MESH;
        spinTarget=reduced?0:0.5;
        beginOrbiters();
      }
    }
    // crossfade alphas
    if(phase===STATE.MESH){meshAlpha=1;partAlpha=0;}
    else if(phase===STATE.DISSOLVE){
      meshAlpha=clamp(1-phaseT/0.12,0,1);
      partAlpha=1;
    } else { // reform
      meshAlpha=clamp((phaseT-0.86)/0.14,0,1);
      partAlpha=1;
    }

    // update particles
    if(phase===STATE.DISSOLVE || phase===STATE.REFORM){
      var g=0.95;
      var swirl=0.9;
      var dT=phase===STATE.DISSOLVE?phaseT:1;
      for(var i=0;i<PCOUNT;i++){
        var p=particles[i];
        if(phase===STATE.DISSOLVE){
          // forces
          var pos=p.world;
          // swirl around y
          var tang=vnorm(vcross(v3(0,1,0),v3(pos.x,pos.y*0.2,pos.z)));
          if(vlen(tang)<0.01)tang=v3(Math.cos(spin),0,-Math.sin(spin));
          p.vel.x+=tang.x*swirl*dt;
          p.vel.z+=tang.z*swirl*dt;
          p.vel.y-=g*dt;
          // slight drag
          p.vel=vscale(p.vel,0.992);
          p.world=vadd(p.world,vscale(p.vel,dt));
        } else {
          // reform: ease toward rotating home
          var target=mApply(R,p.home);
          var e=easeInOutCubic(phaseT);
          // critically-damped follow + snap
          p.world=v3(
            lerp(p.world.x,target.x,Math.min(1,dt*6*(0.4+e))),
            lerp(p.world.y,target.y,Math.min(1,dt*6*(0.4+e))),
            lerp(p.world.z,target.z,Math.min(1,dt*6*(0.4+e)))
          );
          p.vel=vscale(p.vel,0.85);
          if(phaseT>0.96){p.world=v3(target.x,target.y,target.z);}
        }
        // tumble
        var inc=matAxis(p.ang,p.angVel*dt);
        p.orient=matMul(inc,p.orient);
      }
    }

    // update orbiters
    if(orbitersActive){
      for(var o=0;o<OCOUNT;o++){
        var ob=orbiters[o];
        ob.ang+=ob.speed*dt;
        var local=v3(Math.cos(ob.ang)*ob.rad, ob.yb+Math.sin(ob.ang*1.7)*0.12, Math.sin(ob.ang)*ob.rad);
        // tilt the orbit plane
        var tilted=v3(local.x, local.y*Math.cos(ob.tilt)-local.z*Math.sin(ob.tilt), local.y*Math.sin(ob.tilt)+local.z*Math.cos(ob.tilt));
        ob.world=mApply(R,tilted);
        // push trail
        ob.trail[ob.tp]=v3(ob.world.x,ob.world.y,ob.world.z);
        ob.tp=(ob.tp+1)%ob.trail.length;
      }
    }

    // ---------- DRAW ----------
    ctx.clearRect(0,0,W,H);
    // soft vignette already via CSS; add a subtle warm glow behind hat
    var grad=ctx.createRadialGradient(CX,CY*0.96,SCR*0.2,CX,CY*0.96,SCR*2.4);
    grad.addColorStop(0,'rgba(200,38,30,0.10)');
    grad.addColorStop(0.5,'rgba(120,20,15,0.04)');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=grad;
    ctx.fillRect(0,0,W,H);

    // --- shadow (graphic, on ground) ---
    var shp=[];
    for(var s=0;s<shadowPoly.length;s++){
      var sp=shadowPoly[s];
      var gp=v3(sp.x*0.98,GROUND_Y,sp.z*0.98);
      var gw=mApply(R,gp);
      var pp=toScreen(project(gw));
      shp.push({x:pp.x+SCR*0.05,y:pp.y+SCR*0.04});
    }
    ctx.save();
    ctx.globalAlpha=0.55;
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(shp[0].x,shp[0].y);
    for(s=1;s<shp.length;s++)ctx.lineTo(shp[s].x,shp[s].y);
    ctx.closePath();
    ctx.filter='blur('+(SCR*0.012)+'px)';
    ctx.fill();
    ctx.restore();
    // crisp inner shadow
    ctx.save();
    ctx.globalAlpha=0.32;
    ctx.fillStyle='#000';
    ctx.beginPath();
    ctx.moveTo(shp[0].x,shp[0].y);
    for(s=1;s<shp.length;s++)ctx.lineTo(shp[s].x,shp[s].y);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // --- build draw list (mesh faces + particle quads), depth sort ---
    var drawList=[];
    // transformed mesh verts
    var tv=new Array(verts.length);
    for(var vi=0;vi<verts.length;vi++){
      tv[vi]=mApply(R,verts[vi]);
    }
    if(meshAlpha>0.001){
      for(var fi=0;fi<faces.length;fi++){
        var fc=faces[fi];
        // world normal = R*n
        var wn=mApply(R,fc.n);
        var nd=vdot(wn,LIGHT);
        var col=shade(fc.pal,nd);
        var a=tv[fc.a],b=tv[fc.b],c=tv[fc.c];
        var zc=(a.z+b.z+c.z)/3;
        drawList.push({z:zc,type:'tri',a:a,b:b,c:c,col:col,alpha:meshAlpha});
      }
    }

    // particle quads
    if(partAlpha>0.001){
      for(var pi=0;pi<PCOUNT;pi++){
        var pt=particles[pi];
        var w=pt.world;
        // local quad corners
        var s2=pt.size;
        var cs=[
          mApply(pt.orient,v3(-s2,-s2,0)),
          mApply(pt.orient,v3( s2,-s2,0)),
          mApply(pt.orient,v3( s2, s2,0)),
          mApply(pt.orient,v3(-s2, s2,0))
        ];
        var wc=[
          vadd(w,cs[0]),vadd(w,cs[1]),vadd(w,cs[2]),vadd(w,cs[3])
        ];
        drawList.push({z:w.z,type:'quad',c:wc,col:pt.color,alpha:partAlpha});
      }
    }

    // sort far -> near
    drawList.sort(function(p,q){return q.z-p.z;});

    // pass 1: opaque (source-over) — mesh tris + confetti quads
    ctx.save();
    for(var d=0;d<drawList.length;d++){
      var it=drawList[d];
      if(it.type==='tri'){
        var p0=toScreen(project(it.a)),p1=toScreen(project(it.b)),p2=toScreen(project(it.c));
        ctx.globalAlpha=it.alpha;
        ctx.fillStyle=it.col;
        pathTri(ctx,p0,p1,p2);
        ctx.fill();
        // crisp ink outline
        ctx.globalAlpha=it.alpha*0.9;
        ctx.strokeStyle='#0a0605';
        ctx.lineWidth=Math.max(0.5,0.9*it.alpha);
        ctx.lineJoin='round';
        ctx.stroke();
      } else {
        var q0=toScreen(project(it.c[0])),q1=toScreen(project(it.c[1])),
            q2=toScreen(project(it.c[2])),q3=toScreen(project(it.c[3]));
        ctx.globalAlpha=it.alpha;
        ctx.fillStyle=it.col;
        pathQuad(ctx,q0,q1,q2,q3);
        ctx.fill();
        ctx.globalAlpha=it.alpha*0.5;
        ctx.strokeStyle='#0a0605';
        ctx.lineWidth=0.5;
        ctx.stroke();
      }
    }
    ctx.restore();

    // pass 2: additive glow (particle halos + orbiter trails)
    ctx.save();
    ctx.globalCompositeOperation='lighter';
    if(partAlpha>0.001){
      for(var pi2=0;pi2<PCOUNT;pi2++){
        var pt2=particles[pi2];
        var pp2=toScreen(project(pt2.world));
        var rr=pt2.size*SCR*pp2.s*2.2;
        if(rr<0.6)continue;
        var g2=ctx.createRadialGradient(pp2.x,pp2.y,0,pp2.x,pp2.y,rr);
        g2.addColorStop(0,hexA(pt2.color,0.55*partAlpha));
        g2.addColorStop(1,hexA(pt2.color,0));
        ctx.fillStyle=g2;
        ctx.beginPath();
        ctx.arc(pp2.x,pp2.y,rr,0,Math.PI*2);
        ctx.fill();
      }
    }
    // orbiter trails + dots
    if(orbitersActive){
      for(var oi=0;oi<OCOUNT;oi++){
        var ob2=orbiters[oi];
        // trail polyline (oldest -> newest)
        ctx.lineCap='round';
        for(var k=0;k<ob2.trail.length-1;k++){
          var idxA=(ob2.tp+k)%ob2.trail.length;
          var idxB=(ob2.tp+k+1)%ob2.trail.length;
          var pa=toScreen(project(ob2.trail[idxA]));
          var pb=toScreen(project(ob2.trail[idxB]));
          var afade=(k/ob2.trail.length)*0.5;
          ctx.strokeStyle=hexA(ob2.color,afade);
          ctx.lineWidth=ob2.size*SCR*0.9*pa.s;
          ctx.beginPath();
          ctx.moveTo(pa.x,pa.y);
          ctx.lineTo(pb.x,pb.y);
          ctx.stroke();
        }
        // head dot
        var head=toScreen(project(ob2.world));
        var hr=ob2.size*SCR*head.s*1.4;
        var g3=ctx.createRadialGradient(head.x,head.y,0,head.x,head.y,hr*2.4);
        g3.addColorStop(0,hexA(ob2.color,0.85));
        g3.addColorStop(0.4,hexA(ob2.color,0.35));
        g3.addColorStop(1,hexA(ob2.color,0));
        ctx.fillStyle=g3;
        ctx.beginPath();
        ctx.arc(head.x,head.y,hr*2.4,0,Math.PI*2);
        ctx.fill();
        ctx.fillStyle=hexA('#fff3e0',0.9);
        ctx.beginPath();
        ctx.arc(head.x,head.y,Math.max(0.8,hr*0.5),0,Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // expose for sanity
  window.__papercraft={faces:faces.length,particles:PCOUNT};
})();
</script>
</body>
</html>

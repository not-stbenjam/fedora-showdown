<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fedora</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08070d}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Helvetica Neue',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
canvas{display:block;cursor:pointer}
.caption{color:#6a1520;font-size:.72rem;letter-spacing:.38em;text-transform:uppercase;
  margin-top:1.5rem;opacity:.7;user-select:none;animation:cpulse 5s ease-in-out infinite}
@keyframes cpulse{0%,100%{opacity:.5}50%{opacity:.72}}
@media(prefers-reduced-motion:reduce){.caption{animation:none;opacity:.6}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<p class="caption">Red Hat</p>
<script>
(()=>{
const canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
const prefersReduced=window.matchMedia('(prefers-reduced-motion:reduce)').matches;

/* ── Sizing ─────────────────────────────────────── */
let W,H,dpr;
function resize(){
  dpr=window.devicePixelRatio||1;
  const s=Math.min(window.innerWidth,window.innerHeight)*0.9;
  W=H=s; canvas.width=s*dpr; canvas.height=s*dpr;
  canvas.style.width=s+'px'; canvas.style.height=s+'px';
}
resize(); window.addEventListener('resize',resize);

/* ── 3-D math ───────────────────────────────────── */
const rY=(p,a)=>{const c=Math.cos(a),s=Math.sin(a);return[p[0]*c+p[2]*s,p[1],-p[0]*s+p[2]*c]};
const rX=(p,a)=>{const c=Math.cos(a),s=Math.sin(a);return[p[0],p[1]*c-p[2]*s,p[1]*s+p[2]*c]};
const nrm=v=>{const l=Math.sqrt(v[0]*v[0]+v[1]*v[1]+v[2]*v[2])||1e-8;return[v[0]/l,v[1]/l,v[2]/l]};
const dot=(a,b)=>a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;

/* ── Fedora geometry ────────────────────────────── */
const BO=2.08,BI=0.93,CH=1.38,CB=0.93,CT=0.73,DENT=0.30,PINCH=0.19;

function hatPt(reg,u,v){
  const T=Math.PI*2;
  if(reg===0){ // brim
    const th=u*T,t=v,r=BI+t*(BO-BI);
    const x=r*Math.cos(th),z=r*Math.sin(th);
    const ef=t*t,ff=Math.max(0,Math.cos(th-Math.PI*.5)),bf=Math.max(0,Math.cos(th+Math.PI*.5));
    let y=ef*0.06-ff*ef*0.22+bf*ef*0.10;
    const nx=-t*Math.cos(th)*.22,nz=-t*Math.sin(th)*.22,nl=Math.sqrt(nx*nx+1+nz*nz);
    return{pos:[x,y,z],n:[nx/nl,1/nl,nz/nl],band:false};
  }
  if(reg===1){ // crown side
    const th=u*T,h=v,ht=h*CH;
    const ff=Math.max(0,Math.cos(th-Math.PI*.5));
    const pin=PINCH*ff*(.22+.78*h);
    const bR=CB-pin,tR=CT-pin*.85;
    const r=bR+(tR-bR)*h+.045*Math.sin(h*Math.PI);
    const x=r*Math.cos(th),z=r*Math.sin(th);
    return{pos:[x,ht,z],n:[Math.cos(th),0,Math.sin(th)],band:h<.055};
  }
  // top
  const th=u*T,t=Math.sqrt(v),r=t*CT;
  const x=r*Math.cos(th),z=r*Math.sin(th);
  const dw=.34,d=DENT*Math.exp(-(r*r)/(2*dw*dw));
  const ff=Math.max(0,Math.cos(th-Math.PI*.5));
  const pt=.09*ff*(1-t);
  const y=CH-d-pt;
  const nrd=d*r/(dw*dw),nx=nrd*Math.cos(th),nz=nrd*Math.sin(th);
  const nl=Math.sqrt(nx*nx+1+nz*nz);
  return{pos:[x,y,z],n:[nx/nl,1/nl,nz/nl],band:false};
}

/* ── Particles ──────────────────────────────────── */
const CN=[2200,3000,1300],TOT=CN.reduce((a,b)=>a+b,0);
const P=[];
for(let reg=0;reg<3;reg++){
  for(let i=0;i<CN[reg];i++){
    const pt=hatPt(reg,Math.random(),Math.random());
    const bc=pt.band?[26,3,3]:[198,13,18];
    P.push({
      home:[...pt.pos],pos:[...pt.pos],vel:[0,0,0],
      n:pt.n,bc,
      isOrb:false,
      ph:Math.random()*Math.PI*2,
      sp:.4+Math.random()*1.2,
      oR:0,oS:0,oT:0,
      trail:[]
    });
  }
}

// orbit particles
const ON=38,idx=P.map((_,i)=>i);
for(let i=idx.length-1;i>0;i--){const j=Math.random()*i|0;[idx[i],idx[j]]=[idx[j],idx[i]];}
for(let i=0;i<ON;i++){
  const p=P[idx[i]];
  p.isOrb=true; p.bc=[235,68,26];
  p.oR=1.35+Math.random()*1.15;
  p.oS=.25+Math.random()*0.55;
  p.oT=(Math.random()-.5)*1.1;
}

/* ── Lighting ───────────────────────────────────── */
const keyL=nrm([.45,.88,-.42]),fillL=nrm([-.32,-.12,-.48]);
const halfV=nrm([keyL[0],keyL[1],keyL[2]-1]);

function lit(nn,bc,extra){
  const kd=Math.max(0,dot(nn,keyL))*.72;
  const fd=Math.max(0,dot(nn,fillL))*.13;
  const sp=Math.pow(Math.max(0,dot(nn,halfV)),56)*.36;
  // rim light
  const rim=Math.pow(1-Math.abs(dot(nn,[0,0,-1])),4)*.18;
  const t=.14+kd+fd+rim;
  return[
    clamp(bc[0]*t+sp*210+(extra||0),0,255),
    clamp(bc[1]*t+sp*170+(extra||0)*.3,0,255),
    clamp(bc[2]*t+sp*130,0,255)
  ];
}

/* ── State machine ──────────────────────────────── */
const IDLE=0,DIS=1,SWR=2,REF=3,ORB=4;
let phase=prefersReduced?IDLE:IDLE,phaseT=0;
let spin=prefersReduced?.4:0, spinSpd=prefersReduced?0:.45;
const TILT=-0.2;
const DD=1.15,SD=1.8,RD=1.4;

function trigger(){
  if(phase!==IDLE&&phase!==ORB)return;
  phase=DIS;phaseT=0;
  for(const p of P){
    // dissolve from current position (matters for orbit particles)
    const cx=p.pos[0],cy=p.pos[1],cz=p.pos[2];
    const d=nrm([
      cx*.45+p.n[0]*.55+(Math.random()-.5)*.35,
      cy*.45+p.n[1]*.55+(Math.random()-.5)*.35+.25,
      cz*.45+p.n[2]*.55+(Math.random()-.5)*.35
    ]);
    const s=1.6+Math.random()*3.2;
    p.vel=[d[0]*s,d[1]*s+Math.random()*1.6,d[2]*s];
    p.trail=[];
  }
}

canvas.addEventListener('mouseenter',trigger);
canvas.addEventListener('mouseleave',()=>{});
canvas.addEventListener('touchstart',e=>{e.preventDefault();trigger();},{passive:false});

/* ── Update ─────────────────────────────────────── */
function update(dt){
  if(prefersReduced)return;
  const tgt=(phase===IDLE||phase===ORB)?.45:.04;
  spinSpd+=(tgt-spinSpd)*dt*3;
  spin+=spinSpd*dt;
  if(phase===IDLE)return;
  phaseT+=dt;

  if(phase===DIS){
    const t=clamp(phaseT/DD,0,1);
    for(const p of P){
      const dr=1-.65*dt;
      p.vel[0]*=dr;p.vel[1]*=dr;p.vel[2]*=dr;
      p.vel[1]+=dt*.4;
      p.pos[0]+=p.vel[0]*dt+Math.sin(phaseT*p.sp+p.ph)*dt*.22;
      p.pos[1]+=p.vel[1]*dt+Math.cos(phaseT*p.sp*.7+p.ph)*dt*.22;
      p.pos[2]+=p.vel[2]*dt+Math.sin(phaseT*p.sp*1.2+p.ph+1)*dt*.22;
    }
    if(t>=1){phase=SWR;phaseT=0;}
  }
  else if(phase===SWR){
    const t=clamp(phaseT/SD,0,1);
    for(const p of P){
      const dx=p.pos[0],dz=p.pos[2],d2=Math.sqrt(dx*dx+dz*dz)+.1;
      p.vel[0]+=(-dz/d2)*dt*2.4;
      p.vel[2]+=( dx/d2)*dt*2.4;
      p.vel[0]-=dx*dt*.38;p.vel[2]-=dz*dt*.38;
      p.vel[1]+=dt*.07;
      p.vel[0]*=.97;p.vel[1]*=.97;p.vel[2]*=.97;
      p.vel[0]+=(Math.random()-.5)*dt*1.8;
      p.vel[1]+=(Math.random()-.5)*dt*1.1;
      p.vel[2]+=(Math.random()-.5)*dt*1.8;
      p.pos[0]+=p.vel[0]*dt;p.pos[1]+=p.vel[1]*dt;p.pos[2]+=p.vel[2]*dt;
    }
    if(t>=1){phase=REF;phaseT=0;}
  }
  else if(phase===REF){
    const t=clamp(phaseT/RD,0,1);
    const k=2.5+t*12, dmp=.88-t*.06;
    for(const p of P){
      const dx=p.home[0]-p.pos[0],dy=p.home[1]-p.pos[1],dz=p.home[2]-p.pos[2];
      p.vel[0]=(p.vel[0]+dx*k*dt)*dmp;
      p.vel[1]=(p.vel[1]+dy*k*dt)*dmp;
      p.vel[2]=(p.vel[2]+dz*k*dt)*dmp;
      p.pos[0]+=p.vel[0]*dt;p.pos[1]+=p.vel[1]*dt;p.pos[2]+=p.vel[2]*dt;
    }
    if(t>=1){
      phase=ORB;phaseT=0;
      for(const p of P)if(!p.isOrb){p.pos=[...p.home];p.vel=[0,0,0];}
    }
  }
  else if(phase===ORB){
    for(const p of P){
      if(p.isOrb){
        const a=phaseT*p.oS+p.ph;
        let tx=Math.cos(a)*p.oR,tz=Math.sin(a)*p.oR;
        let ty=Math.sin(a*.6+p.ph)*p.oR*.35+.55;
        const ct=Math.cos(p.oT),st=Math.sin(p.oT);
        const ty2=ty*ct-tz*st,tz2=ty*st+tz*ct;
        p.trail.push([p.pos[0],p.pos[1],p.pos[2]]);
        if(p.trail.length>10)p.trail.shift();
        p.pos[0]+=(tx-p.pos[0])*dt*3.5;
        p.pos[1]+=(ty2-p.pos[1])*dt*3.5;
        p.pos[2]+=(tz2-p.pos[2])*dt*3.5;
      }else{
        p.pos[0]+=(p.home[0]-p.pos[0])*dt*10;
        p.pos[1]+=(p.home[1]-p.pos[1])*dt*10;
        p.pos[2]+=(p.home[2]-p.pos[2])*dt*10;
      }
    }
  }
}

/* ── Render ─────────────────────────────────────── */
function render(now){
  const w=W,h=H;
  ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);

  // background
  const bg=ctx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*.64);
  bg.addColorStop(0,'#110e1a');bg.addColorStop(1,'#08070d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,w,h);

  ctx.save();
  ctx.translate(w/2,h/2+12);

  const FOV=w*.56,VD=4.5;
  const proj=p=>{const sc=FOV/(VD+p[2]);return{x:p[0]*sc,y:-p[1]*sc,sc,z:p[2]}};

  // dissolve factor 0→1→0
  let df=0;
  if(phase===DIS)df=clamp(phaseT/DD,0,1);
  else if(phase===SWR)df=1;
  else if(phase===REF)df=1-clamp(phaseT/RD,0,1);

  // ambient glow
  const ga=.10+.02*Math.sin(now*.0005);
  const glw=ctx.createRadialGradient(0,-8,0,0,-8,FOV*.46);
  glw.addColorStop(0,`rgba(155,16,20,${ga*(1-df*.45)})`);
  glw.addColorStop(1,'rgba(155,16,20,0)');
  ctx.fillStyle=glw;ctx.fillRect(-w/2,-h/2,w,h);

  // ground shadow
  const sa=.25*(1-df);
  if(sa>.003){
    const sg=ctx.createRadialGradient(0,FOV*.11,0,0,FOV*.11,FOV*.30);
    sg.addColorStop(0,`rgba(0,0,0,${sa})`);sg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=sg;
    ctx.beginPath();ctx.ellipse(0,FOV*.11,FOV*.33,FOV*.055,0,0,Math.PI*2);ctx.fill();
  }

  const ang=prefersReduced?.4:spin;

  // build render list
  const rl=new Array(P.length);
  for(let i=0;i<P.length;i++){
    const p=P[i];
    let pp=rX(rY(p.pos,ang),TILT);
    let nn=rX(rY(p.n,ang),TILT);
    const pr=proj(pp);
    const isOrb=p.isOrb&&phase===ORB;
    let extra=df*58; if(isOrb)extra=32;
    const col=lit(nn,p.bc,extra);
    let sz=Math.max(1.2,pr.sc*.038);
    let alpha=1;
    if(df>0){sz=lerp(sz,sz*2.4,df);alpha=lerp(1,.5,df);}
    if(isOrb){sz*=1.7;alpha=.5;}
    rl[i]={x:pr.x,y:pr.y,z:pr.z,sz,col,alpha,glow:df>.01||isOrb,isOrb,
            trail:isOrb?p.trail:null,ph:p.ph};
  }

  // depth sort
  rl.sort((a,b)=>b.z-a.z);

  // glow pass (additive)
  if(df>.01||phase===ORB){
    ctx.globalCompositeOperation='lighter';
    for(let i=0;i<rl.length;i++){
      const r=rl[i];
      if(!r.glow)continue;
      const a=r.alpha*.16;
      if(a<.003)continue;
      ctx.globalAlpha=a;
      ctx.fillStyle=`rgb(${r.col[0]|0},${r.col[1]|0},${r.col[2]|0})`;
      ctx.beginPath();ctx.arc(r.x,r.y,r.sz*3.8,0,Math.PI*2);ctx.fill();
    }
    // orbit trails
    for(let i=0;i<rl.length;i++){
      const r=rl[i];
      if(!r.isOrb||!r.trail||r.trail.length<2)continue;
      for(let j=0;j<r.trail.length;j++){
        let tp=rX(rY(r.trail[j],ang),TILT);
        const tpr=proj(tp);
        const ta=(j/r.trail.length)*.10;
        ctx.globalAlpha=ta;
        ctx.fillStyle=`rgb(${r.col[0]|0},${r.col[1]|0},${r.col[2]|0})`;
        ctx.beginPath();ctx.arc(tpr.x,tpr.y,r.sz*2.2,0,Math.PI*2);ctx.fill();
      }
    }
    ctx.globalCompositeOperation='source-over';
  }

  // core pass
  for(let i=0;i<rl.length;i++){
    const r=rl[i];
    ctx.globalAlpha=r.alpha;
    ctx.fillStyle=`rgb(${r.col[0]|0},${r.col[1]|0},${r.col[2]|0})`;
    ctx.beginPath();ctx.arc(r.x,r.y,r.sz,0,Math.PI*2);ctx.fill();
  }

  ctx.globalAlpha=1;
  ctx.restore();
}

/* ── Loop ───────────────────────────────────────── */
let last=performance.now();
function loop(now){
  const dt=Math.min(.05,(now-last)/1000);last=now;
  update(dt);render(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>

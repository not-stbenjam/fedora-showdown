<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fedora</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0f0f1e 50%, #050510 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .container {
            text-align: center;
            position: relative;
            z-index: 1;
        }

        .fedora-wrapper {
            width: 200px;
            height: 200px;
            margin: 0 auto 40px;
            position: relative;
            perspective: 1000px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .fedora-wrapper:hover {
            transform: scale(1.05);
        }

        .fedora {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            animation: rotate 8s linear infinite;
            transition: opacity 0.5s ease, animation-duration 0.5s ease;
        }

        .fedora.dissolving {
            opacity: 0;
            animation-duration: 20s;
        }

        .fedora-part {
            position: absolute;
            left: 50%;
            transform-style: preserve-3d;
        }

        .crown {
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, #cc0000, #990000);
            border-radius: 50% 50% 40% 40%;
            top: 40%;
            transform: translateX(-50%) translateZ(20px) rotateX(-10deg);
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 -5px 10px rgba(0,0,0,0.3),
                inset 0 5px 15px rgba(255,255,255,0.1);
        }

        .band {
            width: 105px;
            height: 15px;
            background: linear-gradient(90deg, #1a1a1a, #2a2a2a, #1a1a1a);
            top: 55%;
            transform: translateX(-50%) translateZ(22px);
            box-shadow: 0 2px 5px rgba(0,0,0,0.4);
        }

        .brim {
            width: 160px;
            height: 80px;
            background: linear-gradient(135deg, #cc0000, #aa0000);
            border-radius: 50%;
            top: 60%;
            transform: translateX(-50%) rotateX(70deg) translateZ(-10px);
            box-shadow: 
                0 15px 40px rgba(0,0,0,0.6),
                inset 0 -5px 15px rgba(0,0,0,0.4),
                inset 0 5px 20px rgba(255,255,255,0.05);
        }

        .brim::before {
            content: '';
            position: absolute;
            width: 70%;
            height: 50%;
            background: #990000;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .caption {
            color: #e0e0e0;
            font-size: 16px;
            font-weight: 300;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.7;
            text-shadow: 0 2px 10px rgba(0,0,0,0.5);
        }

        #particleCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        .orbit-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, rgba(255,200,100,1) 0%, rgba(255,100,50,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            filter: blur(0.5px);
            box-shadow: 0 0 10px rgba(255,150,50,0.8);
        }

        @media (max-width: 480px) {
            .fedora-wrapper {
                width: 150px;
                height: 150px;
            }
            
            .crown {
                width: 75px;
                height: 45px;
            }
            
            .band {
                width: 80px;
                height: 12px;
            }
            
            .brim {
                width: 120px;
                height: 60px;
            }
            
            .caption {
                font-size: 14px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .fedora {
                animation: none;
                transform: rotateY(25deg);
            }
            
            .fedora-wrapper:hover {
                transform: none;
            }
            
            .orbit-particle {
                display: none;
            }
        }

        .glow-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(204,0,0,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            animation: pulse 4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 0.6; transform: translate(-50%, -50%) scale(1.1); }
        }
    </style>
</head>
<body>
    <div class="glow-effect"></div>
    <canvas id="particleCanvas"></canvas>
    
    <div class="container">
        <div class="fedora-wrapper" id="fedoraWrapper">
            <div class="fedora" id="fedora">
                <div class="fedora-part brim"></div>
                <div class="fedora-part crown"></div>
                <div class="fedora-part band"></div>
            </div>
        </div>
        <p class="caption">Fedora</p>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        const fedora = document.getElementById('fedora');
        const wrapper = document.getElementById('fedoraWrapper');
        
        let particles = [];
        let orbitParticles = [];
        let isDissolving = false;
        let isReforming = false;
        let animationId = null;
        let prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
        
        class Particle {
            constructor(x, y, targetX, targetY) {
                this.x = x;
                this.y = y;
                this.originX = targetX;
                this.originY = targetY;
                this.targetX = targetX;
                this.targetY = targetY;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 5;
                this.speedY = (Math.random() - 0.5) * 5;
                this.opacity = 1;
                this.hue = Math.random() * 30 - 15; // Red to orange range
                this.trail = [];
                this.maxTrailLength = 15;
                this.swirl = Math.random() * Math.PI * 2;
                this.swirlSpeed = (Math.random() - 0.5) * 0.1;
                this.reforming = false;
            }
            
            update() {
                this.trail.push({ x: this.x, y: this.y });
                if (this.trail.length > this.maxTrailLength) {
                    this.trail.shift();
                }
                
                if (!this.reforming) {
                    this.swirl += this.swirlSpeed;
                    this.speedX += Math.cos(this.swirl) * 0.2;
                    this.speedY += Math.sin(this.swirl) * 0.1 - 0.05;
                    
                    this.speedX *= 0.98;
                    this.speedY *= 0.98;
                    
                    this.x += this.speedX;
                    this.y += this.speedY;
                    
                    this.opacity = Math.max(0, this.opacity - 0.002);
                } else {
                    const dx = this.targetX - this.x;
                    const dy = this.targetY - this.y;
                    this.x += dx * 0.08;
                    this.y += dy * 0.08;
                    this.speedX *= 0.95;
                    this.speedY *= 0.95;
                    
                    if (Math.abs(dx) < 1 && Math.abs(dy) < 1) {
                        return true;
                    }
                }
                return false;
            }
            
            draw() {
                // Draw trail
                this.trail.forEach((point, index) => {
                    const trailOpacity = (index / this.trail.length) * this.opacity * 0.3;
                    ctx.globalAlpha = trailOpacity;
                    ctx.fillStyle = `hsl(${15 + this.hue}, 100%, 60%)`;
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                // Draw particle with glow
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 3);
                gradient.addColorStop(0, `hsla(${15 + this.hue}, 100%, 70%, ${this.opacity})`);
                gradient.addColorStop(0.5, `hsla(${15 + this.hue}, 100%, 60%, ${this.opacity * 0.5})`);
                gradient.addColorStop(1, `hsla(${15 + this.hue}, 100%, 50%, 0)`);
                
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size * 3, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.globalAlpha = 1;
                ctx.fillStyle = `hsl(${15 + this.hue}, 100%, 80%)`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        class OrbitParticle {
            constructor(centerX, centerY) {
                this.centerX = centerX;
                this.centerY = centerY;
                this.angle = Math.random() * Math.PI * 2;
                this.radius = 80 + Math.random() * 40;
                this.speed = 0.01 + Math.random() * 0.02;
                this.size = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.trail = [];
                this.maxTrailLength = 20;
            }
            
            update() {
                this.angle += this.speed;
                const x = this.centerX + Math.cos(this.angle) * this.radius;
                const y = this.centerY + Math.sin(this.angle) * this.radius * 0.5;
                
                this.trail.push({ x, y });
                if (this.trail.length > this.maxTrailLength) {
                    this.trail.shift();
                }
            }
            
            draw() {
                const x = this.centerX + Math.cos(this.angle) * this.radius;
                const y = this.centerY + Math.sin(this.angle) * this.radius * 0.5;
                
                // Draw trail
                this.trail.forEach((point, index) => {
                    const trailOpacity = (index / this.trail.length) * this.opacity * 0.2;
                    ctx.globalAlpha = trailOpacity;
                    ctx.fillStyle = 'hsl(30, 100%, 60%)';
                    ctx.beginPath();
                    ctx.arc(point.x, point.y, this.size * 0.3, 0, Math.PI * 2);
                    ctx.fill();
                });
                
                // Draw particle
                ctx.globalAlpha = this.opacity;
                const gradient = ctx.createRadialGradient(x, y, 0, x, y, this.size * 2);
                gradient.addColorStop(0, 'hsla(30, 100%, 70%, 1)');
                gradient.addColorStop(1, 'hsla(30, 100%, 50%, 0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(x, y, this.size * 2, 0, Math.PI * 2);
                ctx.fill();
            }
        }
        
        function createParticles() {
            particles = [];
            const rect = wrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 1500; i++) {
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 80;
                const x = centerX + Math.cos(angle) * distance;
                const y = centerY + Math.sin(angle) * distance;
                
                particles.push(new Particle(x, y, x, y));
            }
        }
        
        function createOrbitParticles() {
            orbitParticles = [];
            const rect = wrapper.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            
            for (let i = 0; i < 5; i++) {
                orbitParticles.push(new OrbitParticle(centerX, centerY));
            }
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (isDissolving || isReforming || particles.length > 0) {
                let allReformed = true;
                
                particles = particles.filter(particle => {
                    const reformed = particle.update();
                    if (!reformed) allReformed = false;
                    particle.draw();
                    return !reformed && particle.opacity > 0;
                });
                
                if (isReforming && allReformed && particles.length === 0) {
                    isReforming = false;
                    fedora.classList.remove('dissolving');
                    createOrbitParticles();
                }
            }
            
            orbitParticles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            
            animationId = requestAnimationFrame(animate);
        }
        
        function dissolve() {
            if (isDissolving || isReforming || prefersReducedMotion) return;
            
            isDissolving = true;
            fedora.classList.add('dissolving');
            createParticles();
            
            setTimeout(() => {
                isDissolving = false;
                isReforming = true;
                particles.forEach(p => p.reforming = true);
            }, 2000);
        }
        
        wrapper.addEventListener('mouseenter', dissolve);
        wrapper.addEventListener('touchstart', (e) => {
            e.preventDefault();
            dissolve();
        });
        
        if (!prefersReducedMotion) {
            animate();
        }
    </script>
</body>
</html>

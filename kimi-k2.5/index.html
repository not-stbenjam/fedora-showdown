<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Red Hat Particle Dissolve</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: radial-gradient(ellipse at center, #1f1f2e 0%, #0a0a0f 100%);
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
}
#canvas-container {
  width: 100vw;
  height: 100vh;
  position: relative;
}
canvas {
  display: block;
  touch-action: none;
}
#caption {
  position: absolute;
  bottom: 8%;
  left: 50%;
  transform: translateX(-50%);
  color: #8a8aa8;
  font-size: 0.85rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.7;
  pointer-events: none;
  text-align: center;
  text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  transition: opacity 0.3s;
}
@media (max-width: 600px) {
  #caption { font-size: 0.7rem; letter-spacing: 0.15em; }
}
</style>
</head>
<body>
<div id="canvas-container"></div>
<div id="caption">Hover to dissolve</div>
<script type="module">
import * as THREE from 'https://esm.sh/three@0.160.0';

const container = document.getElementById('canvas-container');
const caption = document.getElementById('caption');

// Reduced motion check
const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

// Scene setup
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.04);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
camera.position.set(0, 0.5, 6);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
container.appendChild(renderer.domElement);

// Lighting
const ambientLight = new THREE.AmbientLight(0x404060, 1.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 2);
dirLight.position.set(5, 8, 5);
dirLight.castShadow = true;
dirLight.shadow.mapSize.width = 1024;
dirLight.shadow.mapSize.height = 1024;
scene.add(dirLight);

const warmLight = new THREE.PointLight(0xff4400, 1, 10);
warmLight.position.set(-3, 2, 3);
scene.add(warmLight);

const rimLight = new THREE.SpotLight(0x4444ff, 2);
rimLight.position.set(0, 5, -5);
rimLight.lookAt(0,0,0);
scene.add(rimLight);

// Hat materials
const redMaterial = new THREE.MeshStandardMaterial({
  color: 0xcc0000,
  roughness: 0.35,
  metalness: 0.2,
  transparent: true,
  opacity: 1
});

const blackMaterial = new THREE.MeshStandardMaterial({
  color: 0x111111,
  roughness: 0.6,
  metalness: 0.1,
  transparent: true,
  opacity: 1
});

// Hat geometry group
const hatGroup = new THREE.Group();
scene.add(hatGroup);

// Crown (tapered)
const crownGeo = new THREE.CylinderGeometry(0.75, 1, 1.2, 64, 8);
const crown = new THREE.Mesh(crownGeo, redMaterial);
crown.position.y = 0.6;
crown.castShadow = true;
crown.receiveShadow = true;
hatGroup.add(crown);

// Brim (flat cylinder)
const brimGeo = new THREE.CylinderGeometry(2.3, 2.3, 0.08, 64);
const brim = new THREE.Mesh(brimGeo, redMaterial);
brim.position.y = -0.04;
brim.castShadow = true;
brim.receiveShadow = true;
hatGroup.add(brim);

// Band
const bandGeo = new THREE.CylinderGeometry(1.02, 1.02, 0.25, 64);
const band = new THREE.Mesh(bandGeo, blackMaterial);
band.position.y = 0.1;
band.castShadow = true;
hatGroup.add(band);

// Shadow plane
const planeGeo = new THREE.PlaneGeometry(10, 10);
const planeMat = new THREE.ShadowMaterial({ opacity: 0.3 });
const plane = new THREE.Mesh(planeGeo, planeMat);
plane.rotation.x = -Math.PI / 2;
plane.position.y = -1;
plane.receiveShadow = true;
scene.add(plane);

// Particle System
const particleCount = 3500;
const particleGeo = new THREE.BufferGeometry();
const positions = new Float32Array(particleCount * 3);
const basePositions = new Float32Array(particleCount * 3);
const velocities = new Float32Array(particleCount * 3);
const phases = new Float32Array(particleCount);
const isOrbiter = new Uint8Array(particleCount);

let pIdx = 0;

function addParticle(x, y, z) {
  if(pIdx >= particleCount) return;
  basePositions[pIdx*3] = x;
  basePositions[pIdx*3+1] = y;
  basePositions[pIdx*3+2] = z;
  positions[pIdx*3] = x;
  positions[pIdx*3+1] = y;
  positions[pIdx*3+2] = z;
  velocities[pIdx*3] = 0;
  velocities[pIdx*3+1] = 0;
  velocities[pIdx*3+2] = 0;
  phases[pIdx] = Math.random() * Math.PI * 2;
  isOrbiter[pIdx] = Math.random() > 0.92 ? 1 : 0;
  pIdx++;
}

// Sample points on hat surfaces
// Crown
for(let i=0; i<1500; i++) {
  const h = Math.random() * 1.2;
  const t = h / 1.2;
  const r = 1 - t * 0.25; // taper from 1 to 0.75
  const ang = Math.random() * Math.PI * 2;
  addParticle(Math.cos(ang)*r, h, Math.sin(ang)*r);
}
// Brim
for(let i=0; i<1200; i++) {
  const r = 1 + Math.random() * 1.3;
  const ang = Math.random() * Math.PI * 2;
  addParticle(Math.cos(ang)*r, 0, Math.sin(ang)*r);
}
// Band
for(let i=0; i<500; i++) {
  const h = Math.random() * 0.25;
  const ang = Math.random() * Math.PI * 2;
  addParticle(Math.cos(ang)*1.02, 0.1+h-0.125, Math.sin(ang)*1.02);
}
// Fill rest
for(let i=pIdx; i<particleCount; i++) {
  addParticle(0,0,0);
}

particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));

// Glow texture
function createGlowTexture() {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32,32,0, 32,32,32);
  grad.addColorStop(0, 'rgba(255,240,200,1)');
  grad.addColorStop(0.3, 'rgba(255,100,50,0.6)');
  grad.addColorStop(0.7, 'rgba(200,50,50,0.2)');
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,64,64);
  return new THREE.CanvasTexture(canvas);
}

const particleMat = new THREE.PointsMaterial({
  color: 0xff6644,
  size: 0.12,
  map: createGlowTexture(),
  blending: THREE.AdditiveBlending,
  depthWrite: false,
  transparent: true,
  opacity: 0
});

const particleSystem = new THREE.Points(particleGeo, particleMat);
scene.add(particleSystem);

// State management
let state = 'idle';
let stateTime = 0;
let rotationSpeed = prefersReducedMotion ? 0 : 0.008;
const clock = new THREE.Clock();

const targetSpeeds = {
  idle: prefersReducedMotion ? 0 : 0.008,
  dissolve: prefersReducedMotion ? 0 : 0.002,
  swirl: prefersReducedMotion ? 0 : 0.003,
  reform: prefersReducedMotion ? 0 : 0.002,
  orbit: prefersReducedMotion ? 0 : 0.006
};

let particleOpacity = 0;
let hatOpacity = 1;
let dissolveStartPositions = null;

function setState(newState) {
  state = newState;
  stateTime = 0;
  if(newState === 'dissolve') {
    // Store current positions for dissolve origin
    dissolveStartPositions = new Float32Array(particleCount * 3);
    for(let i=0; i<particleCount*3; i++) dissolveStartPositions[i] = positions[i];
    caption.style.opacity = '0';
  }
  if(newState === 'orbit') {
    caption.textContent = 'Touch to reform';
    caption.style.opacity = '0.7';
  }
}

// Interaction
const trigger = () => {
  if(prefersReducedMotion) {
    // Simple fade for reduced motion
    if(state === 'idle') {
      hatOpacity = 0;
      particleOpacity = 1;
      setTimeout(() => { hatOpacity = 1; particleOpacity = 0; }, 1000);
    }
    return;
  }
  if(state === 'idle' || state === 'orbit') {
    setState('dissolve');
  }
};

container.addEventListener('pointerenter', trigger);
container.addEventListener('touchstart', (e) => { e.preventDefault(); trigger(); }, {passive: false});
container.addEventListener('click', trigger);

// Resize
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  const time = clock.getElapsedTime();
  stateTime += delta;
  
  // Smooth rotation speed
  const targetSpeed = targetSpeeds[state] || 0;
  rotationSpeed += (targetSpeed - rotationSpeed) * delta * 2;
  hatGroup.rotation.y += rotationSpeed;
  particleSystem.rotation.y += rotationSpeed * 0.5;
  
  // State logic
  switch(state) {
    case 'idle':
      hatOpacity += (1 - hatOpacity) * delta * 5;
      particleOpacity += (0 - particleOpacity) * delta * 5;
      break;
      
    case 'dissolve': {
      hatOpacity += (0 - hatOpacity) * delta * 4;
      particleOpacity += (1 - particleOpacity) * delta * 4;
      
      const expand = Math.min(stateTime * 1.5, 1.0);
      const jitter = 0.05;
      
      for(let i=0; i<particleCount; i++) {
        const bx = basePositions[i*3];
        const by = basePositions[i*3+1];
        const bz = basePositions[i*3+2];
        
        // Direction from center with noise
        const dx = bx + (Math.random()-0.5)*0.5;
        const dy = (by - 0.5) + (Math.random()-0.5)*0.5;
        const dz = bz + (Math.random()-0.5)*0.5;
        const len = Math.sqrt(dx*dx + dy*dy + dz*dz) + 0.001;
        
        const exp = expand * 2.5;
        positions[i*3] = bx + (dx/len) * exp + Math.sin(time*10+i)*jitter;
        positions[i*3+1] = by + (dy/len) * exp + Math.cos(time*8+i)*jitter;
        positions[i*3+2] = bz + (dz/len) * exp + Math.sin(time*6+i)*jitter;
      }
      particleGeo.attributes.position.needsUpdate = true;
      
      if(stateTime > 0.8) setState('swirl');
      break;
    }
    
    case 'swirl': {
      const swirlTime = stateTime;
      const radiusBase = 2.5;
      
      for(let i=0; i<particleCount; i++) {
        const angle = time * 0.8 + phases[i] + i*0.01;
        const radius = radiusBase + Math.sin(time + phases[i]) * 0.8;
        const yOffset = Math.sin(time * 1.5 + phases[i]) * 1.2;
        
        // Spiral outward then inward
        const spiral = Math.sin(swirlTime * 0.5) * 0.5;
        
        positions[i*3] = Math.cos(angle) * (radius + spiral);
        positions[i*3+1] = yOffset + Math.cos(time * 2 + phases[i]) * 0.3;
        positions[i*3+2] = Math.sin(angle) * (radius + spiral);
      }
      particleGeo.attributes.position.needsUpdate = true;
      
      if(stateTime > 2.5) setState('reform');
      break;
    }
    
    case 'reform': {
      hatOpacity += (1 - hatOpacity) * delta * 1.5;
      const t = Math.min(stateTime * 0.8, 1);
      
      for(let i=0; i<particleCount; i++) {
        const bx = basePositions[i*3];
        const by = basePositions[i*3+1];
        const bz = basePositions[i*3+2];
        
        positions[i*3] += (bx - positions[i*3]) * delta * 4;
        positions[i*3+1] += (by - positions[i*3+1]) * delta * 4;
        positions[i*3+2] += (bz - positions[i*3+2]) * delta * 4;
      }
      particleGeo.attributes.position.needsUpdate = true;
      
      if(stateTime > 2.0) setState('orbit');
      break;
    }
    
    case 'orbit': {
      hatOpacity = 1;
      particleOpacity = 1;
      
      for(let i=0; i<particleCount; i++) {
        const bx = basePositions[i*3];
        const by = basePositions[i*3+1];
        const bz = basePositions[i*3+2];
        
        if(isOrbiter[i]) {
          // Orbit around hat
          const angle = time * 0.4 + phases[i];
          const r = 1.8 + Math.sin(phases[i]*3) * 0.6;
          const y = by + Math.sin(time + phases[i]) * 0.4;
          
          positions[i*3] = Math.cos(angle) * r;
          positions[i*3+1] = y;
          positions[i*3+2] = Math.sin(angle) * r;
        } else {
          // Stay at base (hidden inside)
          positions[i*3] = bx;
          positions[i*3+1] = by;
          positions[i*3+2] = bz;
        }
      }
      particleGeo.attributes.position.needsUpdate = true;
      break;
    }
  }
  
  // Apply opacities
  redMaterial.opacity = hatOpacity;
  blackMaterial.opacity = hatOpacity;
  particleMat.opacity = particleOpacity * 0.9;
  
  // Gentle floating for whole scene
  if(!prefersReducedMotion) {
    hatGroup.position.y = Math.sin(time * 0.5) * 0.1;
    particleSystem.position.y = hatGroup.position.y;
  }
  
  renderer.render(scene, camera);
}

animate();
</script>
</body>
</html>

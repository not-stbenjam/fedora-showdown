<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Red Hat Fedora Particle Hero</title>
  <style>
    :root {
      color-scheme: dark;
      --red-1: #9f0f1b;
      --red-2: #d82935;
      --red-3: #ff4a55;
      --gold: #ffd27a;
      --ink: #05050a;
      --text: rgba(255, 246, 238, 0.86);
      --muted: rgba(255, 226, 226, 0.58);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .hero {
      position: relative;
      isolation: isolate;
      display: grid;
      place-items: center;
      min-height: 100svh;
      width: 100vw;
      overflow: hidden;
      padding: clamp(1rem, 4vw, 3rem);
      background:
        radial-gradient(circle at 50% 42%, rgba(170, 26, 36, 0.30), transparent 34%),
        radial-gradient(circle at 50% 62%, rgba(255, 174, 87, 0.12), transparent 28%),
        radial-gradient(circle at 50% 50%, #11111c 0%, #070710 48%, #030307 100%);
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: -25%;
      z-index: -2;
      background:
        conic-gradient(from 180deg at 50% 50%,
          transparent 0deg,
          rgba(216, 41, 53, 0.10) 52deg,
          transparent 96deg,
          rgba(255, 210, 122, 0.08) 145deg,
          transparent 210deg,
          rgba(216, 41, 53, 0.10) 292deg,
          transparent 360deg);
      filter: blur(34px);
      opacity: 0.62;
      animation: ambientGlow 18s linear infinite;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 255, 255, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 56px 56px;
      mask-image: radial-gradient(circle at center, black 0%, transparent 72%);
      opacity: 0.28;
    }

    @keyframes ambientGlow {
      to {
        transform: rotate(360deg);
      }
    }

    #particleCanvas {
      position: fixed;
      inset: 0;
      z-index: 2;
      width: 100%;
      height: 100%;
      display: block;
      pointer-events: none;
    }

    .stage {
      position: relative;
      z-index: 3;
      display: grid;
      place-items: center;
      width: min(78vmin, 620px);
      aspect-ratio: 1.28 / 1;
      perspective: 1050px;
      transform-style: preserve-3d;
      cursor: pointer;
      outline: none;
    }

    .stage:focus-visible .hat {
      filter:
        drop-shadow(0 0 18px rgba(255, 202, 112, 0.35))
        drop-shadow(0 24px 70px rgba(0, 0, 0, 0.65));
    }

    .hat {
      position: relative;
      width: min(48vw, 380px);
      min-width: 180px;
      aspect-ratio: 1.85 / 1;
      transform-style: preserve-3d;
      will-change: transform, opacity;
      animation: hatSpin 12s cubic-bezier(0.45, 0, 0.55, 1) infinite;
      transition: opacity 700ms ease, filter 700ms ease;
      filter:
        drop-shadow(0 34px 62px rgba(0, 0, 0, 0.72))
        drop-shadow(0 0 28px rgba(216, 41, 53, 0.24));
    }

    .hero.interacting .hat {
      animation-duration: 72s;
    }

    .hero.dissolving .hat {
      animation-duration: 90s;
      opacity: 0;
      pointer-events: none;
      filter: drop-shadow(0 20px 42px rgba(0, 0, 0, 0.45));
    }

    @keyframes hatSpin {
      from {
        transform: rotateX(62deg) rotateY(0deg) rotateZ(-7deg);
      }
      to {
        transform: rotateX(62deg) rotateY(360deg) rotateZ(-7deg);
      }
    }

    .hat-shadow {
      position: absolute;
      left: 50%;
      top: 84%;
      width: 78%;
      height: 14%;
      transform: translate(-50%, -50%) rotateX(72deg);
      transform-style: preserve-3d;
      border-radius: 50%;
      background: radial-gradient(ellipse at center, rgba(0, 0, 0, 0.70) 0%, rgba(0, 0, 0, 0.38) 42%, transparent 72%);
      filter: blur(8px);
      opacity: 0.88;
    }

    .brim {
      position: absolute;
      left: 50%;
      top: 66%;
      width: 96%;
      height: 24%;
      transform: translate(-50%, -50%) rotateX(68deg) translateZ(8px);
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 50% 42%, rgba(255, 94, 99, 0.95) 0%, var(--red-2) 38%, var(--red-1) 72%, #5d0710 100%);
      box-shadow:
        inset 0 12px 20px rgba(255, 155, 163, 0.26),
        inset 0 -16px 24px rgba(68, 0, 10, 0.46),
        0 12px 24px rgba(216, 41, 53, 0.22);
    }

    .brim::before,
    .brim::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
    }

    .brim::before {
      background:
        radial-gradient(ellipse at 50% 12%, rgba(255, 255, 255, 0.22), transparent 36%),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.08), transparent 45%, rgba(0, 0, 0, 0.22));
      mix-blend-mode: screen;
    }

    .brim::after {
      background:
        radial-gradient(ellipse at 50% 72%, rgba(0, 0, 0, 0.34), transparent 58%),
        linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.36));
      mix-blend-mode: multiply;
    }

    .crown {
      position: absolute;
      left: 50%;
      top: 51%;
      width: 62%;
      height: 64%;
      transform: translate(-50%, -50%) rotateX(68deg) translateZ(58px);
      overflow: hidden;
      border-radius: 48% 48% 40% 40% / 34% 34% 60% 60%;
      background:
        linear-gradient(92deg, rgba(255, 91, 96, 0.96), var(--red-2) 34%, rgba(158, 15, 27, 0.96) 66%, rgba(255, 91, 96, 0.86)),
        radial-gradient(circle at 50% 18%, rgba(255, 255, 255, 0.20), transparent 38%);
      box-shadow:
        inset 18px 0 24px rgba(255, 169, 174, 0.14),
        inset -22px 0 28px rgba(75, 0, 12, 0.36),
        0 -12px 34px rgba(255, 74, 85, 0.14);
    }

    .crown::before {
      content: "";
      position: absolute;
      inset: 8% 19% 12%;
      border-radius: 50%;
      background:
        linear-gradient(90deg, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.42) 44%, rgba(255, 255, 255, 0.10)),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.16), rgba(0, 0, 0, 0.28));
      filter: blur(0.2px);
      opacity: 0.92;
    }

    .crown::after {
      content: "";
      position: absolute;
      left: 10%;
      right: 10%;
      bottom: -18%;
      height: 38%;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at center, rgba(255, 255, 255, 0.12), transparent 62%),
        linear-gradient(to bottom, rgba(255, 255, 255, 0.08), rgba(0, 0, 0, 0.28));
      mix-blend-mode: screen;
    }

    .band {
      position: absolute;
      left: 50%;
      top: 62%;
      width: 78%;
      height: 12%;
      transform: translate(-50%, -50%) rotateX(68deg) translateZ(42px);
      border-radius: 50%;
      background:
        linear-gradient(to bottom, #25252a, #08080b 54%, #000 100%);
      box-shadow:
        inset 0 3px 6px rgba(255, 255, 255, 0.08),
        inset 0 -5px 10px rgba(0, 0, 0, 0.85),
        0 8px 18px rgba(0, 0, 0, 0.36);
    }

    .band::before {
      content: "";
      position: absolute;
      inset: 18% 8%;
      border-radius: 50%;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.10), transparent 48%, rgba(0, 0, 0, 0.38));
      opacity: 0.72;
    }

    .ribbon {
      position: absolute;
      left: 50%;
      top: 56%;
      width: 34%;
      height: 17%;
      transform: translate(-50%, -50%) rotateX(68deg) translateZ(56px);
      transform-style: preserve-3d;
      pointer-events: none;
    }

    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      top: 18%;
      width: 48%;
      height: 64%;
      border-radius: 60% 12% 12% 60%;
      background:
        radial-gradient(ellipse at 35% 30%, rgba(255, 137, 142, 0.55), transparent 32%),
        linear-gradient(135deg, var(--red-3), var(--red-1));
      box-shadow:
        inset 8px 10px 16px rgba(255, 255, 255, 0.14),
        inset -10px -10px 18px rgba(62, 0, 10, 0.30),
        0 8px 18px rgba(0, 0, 0, 0.28);
    }

    .ribbon::before {
      left: 0;
      transform: rotate(-24deg);
      transform-origin: right center;
    }

    .ribbon::after {
      right: 0;
      border-radius: 12% 60% 60% 12%;
      transform: rotate(24deg);
      transform-origin: left center;
    }

    .ribbon-knot {
      position: absolute;
      left: 50%;
      top: 50%;
      width: 18%;
      height: 28%;
      transform: translate(-50%, -50%) rotateX(68deg) translateZ(4px);
      border-radius: 45% 55% 50% 50%;
      background:
        radial-gradient(ellipse at 45% 30%, rgba(255, 176, 180, 0.45), transparent 34%),
        linear-gradient(135deg, var(--red-3), var(--red-1));
      box-shadow:
        inset -8px -10px 14px rgba(56, 0, 10, 0.32),
        0 8px 18px rgba(0, 0, 0, 0.30);
    }

    .caption {
      position: absolute;
      left: 50%;
      bottom: clamp(1rem, 4vh, 2.4rem);
      z-index: 4;
      transform: translateX(-50%);
      width: min(92vw, 520px);
      text-align: center;
      color: var(--text);
      font-size: clamp(0.78rem, 1.5vw, 0.96rem);
      line-height: 1.5;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.75);
    }

    .caption span {
      display: block;
      margin-top: 0.34rem;
      color: var(--muted);
      font-size: 0.72em;
      letter-spacing: 0.18em;
    }

    @media (max-width: 520px) {
      .stage {
        width: 86vmin;
      }

      .caption {
        letter-spacing: 0.10em;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.001ms !important;
        scroll-behavior: auto !important;
      }

      .hero::before {
        animation: none !important;
      }

      .hat {
        animation: none !important;
        transform: rotateX(62deg) rotateY(0deg) rotateZ(-7deg);
      }

      .hero.dissolving .hat {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <main class="hero" aria-label="Animated Red Hat style fedora particle scene">
    <canvas id="particleCanvas" aria-hidden="true"></canvas>

    <section class="stage" tabindex="0" aria-label="Hover or tap to dissolve and reform the fedora">
      <div class="hat" aria-hidden="true">
        <div class="hat-shadow"></div>
        <div class="brim"></div>
        <div class="crown"></div>
        <div class="band"></div>
        <div class="ribbon">
          <span class="ribbon-knot"></span>
        </div>
      </div>
    </section>

    <p class="caption">
      Fedora particle field
      <span>Hover or tap to release the embers</span>
    </p>
  </main>

  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("particleCanvas");
      const ctx = canvas.getContext("2d", { alpha: true });
      const hero = document.querySelector(".hero");
      const stage = document.querySelector(".stage");
      const media = window.matchMedia("(prefers-reduced-motion: reduce)");

      const TAU = Math.PI * 2;
      const prefersReduced = () => media.matches;
      let reducedMotion = prefersReduced();
      let width = 0;
      let height = 0;
      let dpr = 1;
      let cx = 0;
      let cy = 0;
      let scale = 1;
      let lastTime = 0;
      let spinAngle = 0;
      let rotX = 62 * Math.PI / 180;
      let targetProgress = 0;
      let progress = 0;
      let dissolved = false;
      let holding = false;
      let dissolveStart = 0;
      let reformedAt = 0;
      let particles = [];
      let orbiting = [];

      function mulberry32(seed) {
        return function random() {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }

      const random = mulberry32(0x5EED17);

      function gaussian() {
        let u = 0;
        let v = 0;
        while (u === 0) u = random();
        while (v === 0) v = random();
        return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
      }

      function lerp(a, b, t) {
        return a + (b - a) * t;
      }

      function hatPoint() {
        const r = random();
        let x;
        let y;
        let z;
        let hue;
        let sat;
        let light;
        let alpha = 1;

        if (r < 0.56) {
          const a = random() * TAU;
          const rr = Math.sqrt(random());
          x = Math.cos(a) * 182 * rr;
          y = Math.sin(a) * 23 * rr;
          z = gaussian() * 5;
          hue = random() < 0.12 ? 43 + random() * 12 : 352 + random() * 16;
          sat = random() < 0.12 ? 100 : 88;
          light = random() < 0.12 ? 62 + random() * 10 : 50 + random() * 9;
        } else if (r < 0.70) {
          const a = random() * TAU;
          const rr = Math.sqrt(random());
          x = Math.cos(a) * 98 * rr;
          y = -51 + Math.sin(a) * 11 * rr;
          z = (random() < 0.5 ? -1 : 1) * (18 + random() * 12);
          hue = 15 + random() * 7;
          sat = 42;
          light = 9 + random() * 4;
          alpha = 0.46;
        } else if (r < 0.76) {
          const side = random() < 0.5 ? -1 : 1;
          const a = random() * TAU;
          const rr = Math.sqrt(random());
          x = side * (38 + 52 * rr) + gaussian() * 7;
          y = 8 + gaussian() * 10;
          z = 24 + random() * 10;
          hue = 350 + random() * 12;
          sat = 94;
          light = 56 + random() * 8;
        } else {
          const side = random() < 0.5 ? -1 : 1;
          y = -48 + random() * 162;
          const t = (y + 48) / 162;
          const topNarrow = 1 - 0.18 * Math.pow(Math.max(0, (y - 18) / 142), 0.72);
          const half = 78 * topNarrow;
          x = (random() * 2 - 1) * half;
          const indent = 19 * Math.exp(-Math.pow(x / 34, 2)) * Math.pow(Math.max(0, (y + 45) / 140), 0.55);
          z = side * (10 + indent + gaussian() * 4);
          hue = 352 + random() * 18;
          sat = 88;
          light = 55 + random() * 10;
        }

        return { x, y, z, hue, sat, light, alpha };
      }

      function targetPoint(base) {
        const a = random() * TAU;
        const r = 190 + Math.pow(random(), 0.62) * 430;
        return {
          x: base.x * 0.24 + Math.cos(a) * r * 1.08,
          y: base.y * 0.24 + (random() - 0.5) * 270 - 42,
          z: base.z * 0.24 + Math.sin(a) * r * 1.08
        };
      }

      function makeOrbitParticle() {
        const a = random() * TAU;
        const r = 210 + random() * 105;
        return {
          angle: a,
          radius: r,
          y: -72 + random() * 190,
          zOffset: gaussian() * 16,
          hue: 35 + random() * 34,
          phase: random() * TAU,
          speed: (random() - 0.5) * 0.006,
          size: 0.9 + random() * 2.2
        };
      }

      function resize() {
        width = window.innerWidth;
        height = window.innerHeight;
        dpr = Math.min(2, window.devicePixelRatio || 1);
        canvas.width = Math.floor(width * dpr);
        canvas.height = Math.floor(height * dpr);
        canvas.style.width = width + "px";
        canvas.style.height = height + "px";
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
        cx = width / 2;
        cy = height / 2 + Math.min(24, height * 0.025);
        scale = Math.min(width, height) * 0.00135;
        scale = Math.max(0.48, Math.min(2.75, scale));
        generateParticles();
      }

      function generateParticles() {
        const areaCount = Math.round((width * height) / 540);
        const count = Math.min(4200, Math.max(2200, areaCount));
        particles = Array.from({ length: count }, () => {
          const base = hatPoint();
          return {
            base: { x: base.x, y: base.y, z: base.z },
            target: targetPoint(base),
            hue: base.hue,
            sat: base.sat,
            light: base.light,
            alpha: base.alpha,
            size: 0.55 + random() * 1.65,
            phase: random() * TAU,
            twinkle: random() * TAU
          };
        });

        orbiting = Array.from({ length: 26 }, makeOrbitParticle);
      }

      function rotate3D(point) {
        const cy = Math.cos(spinAngle);
        const sy = Math.sin(spinAngle);
        const cr = Math.cos(rotX);
        const sr = Math.sin(rotX);

        const x1 = point.x * cy + point.z * sy;
        const z1 = -point.x * sy + point.z * cy;
        const y1 = point.y;

        const x2 = x1;
        const y2 = y1 * cr - z1 * sr;
        const z2 = y1 * sr + z1 * cr;

        return { x: x2, y: y2, z: z2 };
      }

      function project(point) {
        const r = rotate3D(point);
        const perspective = 860 / (860 - r.z);
        return {
          x: cx + r.x * scale * perspective,
          y: cy + r.y * scale * perspective,
          z: r.z,
          perspective
        };
      }

      function particlePosition(particle, now, active) {
        const p = active ? progress : 0;
        const time = now * 0.001;
        const swirl = active ? 1 : 0;
        const angle = time * 1.55 + particle.phase;
        const drift = Math.sin(time * 0.72 + particle.twinkle) * 0.5;

        return {
          x: lerp(particle.base.x, particle.target.x, p)
            + Math.cos(angle) * (28 + 36 * swirl)
            + drift * 8,
          y: lerp(particle.base.y, particle.target.y, p)
            + Math.sin(angle * 0.91) * (18 + 28 * swirl)
            + drift * 5,
          z: lerp(particle.base.z, particle.target.z, p)
            + Math.sin(angle * 1.37) * (18 + 22 * swirl)
        };
      }

      function drawGlowParticle(point, particle, alpha, radius) {
        ctx.beginPath();
        ctx.arc(point.x, point.y, radius, 0, TAU);
        ctx.fillStyle = `hsla(${particle.hue}, ${particle.sat}%, ${particle.light}%, ${alpha})`;
        ctx.fill();
      }

      function drawOrbiting(now, dt) {
        if (reducedMotion || !dissolved) return;

        const time = now * 0.001;
        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const o of orbiting) {
          o.angle += o.speed * dt * 0.001;
          const a = o.angle + Math.sin(time * 0.35 + o.phase) * 0.08;
          const x = Math.cos(a) * o.radius + Math.cos(a * 2.1) * 10;
          const y = o.y + Math.sin(a * 1.7 + o.phase) * 22;
          const z = Math.sin(a) * o.radius + o.zOffset;
          const point = project({ x, y, z });
          const alpha = 0.16 + 0.12 * Math.sin(time * 2.4 + o.phase);

          ctx.beginPath();
          ctx.moveTo(point.x - Math.cos(a) * 11, point.y - Math.sin(a * 1.7) * 11);
          ctx.lineTo(point.x, point.y);
          ctx.strokeStyle = `hsla(${o.hue}, 100%, 66%, ${alpha * 0.36})`;
          ctx.lineWidth = Math.max(0.6, o.size * 0.45);
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(point.x, point.y, o.size, 0, TAU);
          ctx.fillStyle = `hsla(${o.hue}, 100%, 68%, ${alpha})`;
          ctx.fill();
        }

        ctx.restore();
      }

      function drawParticles(now, dt) {
        const active = dissolved || progress > 0.001;
        const points = new Array(particles.length);

        for (let i = 0; i < particles.length; i++) {
          const particle = particles[i];
          const pos = particlePosition(particle, now, active);
          const projected = project(pos);
          const twinkle = 0.78 + 0.22 * Math.sin(now * 0.003 + particle.twinkle);
          const size = particle.size * (active ? 1.18 : 0.88) * projected.perspective;
          const alpha = particle.alpha * (0.36 + 0.52 * active) * twinkle;

          points[i] = {
            x: projected.x,
            y: projected.y,
            z: projected.z,
            particle,
            alpha,
            size
          };
        }

        points.sort((a, b) => a.z - b.z);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";

        for (const p of points) {
          drawGlowParticle(p, p.particle, p.alpha * 0.13, p.size * 5.2);
        }

        for (const p of points) {
          drawGlowParticle(p, p.particle, p.alpha * 0.72, p.size * 1.1);
          drawGlowParticle(p, p.particle, p.alpha * 0.95, Math.max(0.45, p.size * 0.42));
        }

        ctx.restore();
      }

      function drawBackgroundGlow(now) {
        const pulse = 0.5 + 0.5 * Math.sin(now * 0.0011);
        ctx.save();
        ctx.globalCompositeOperation = "screen";
        const radius = Math.max(width, height) * (0.36 + pulse * 0.035);
        const gradient = ctx.createRadialGradient(cx, cy + height * 0.04, 0, cx, cy + height * 0.04, radius);
        gradient.addColorStop(0, `rgba(216, 41, 53, ${0.10 + pulse * 0.045})`);
        gradient.addColorStop(0.42, "rgba(255, 129, 139, 0.035)");
        gradient.addColorStop(1, "rgba(0, 0, 0, 0)");
        ctx.fillStyle = gradient;
        ctx.fillRect(0, 0, width, height);
        ctx.restore();
      }

      function animate(now) {
        const dt = Math.min(42, now - lastTime || 16);
        lastTime = now;

        if (!reducedMotion) {
          const slowFactor = holding ? 0.12 : 1;
          spinAngle += dt * 0.00052 * slowFactor;
        }

        if (!reducedMotion && dissolved) {
          const elapsed = now - dissolveStart;
          if (targetProgress > 0.95 && elapsed > 1450) {
            targetProgress = 0;
            reformedAt = now;
          }

          const easing = Math.min(1, dt * 0.0028);
          progress += (targetProgress - progress) * easing;
          if (Math.abs(progress - targetProgress) < 0.001) {
            progress = targetProgress;
          }
        } else {
          targetProgress = 0;
          progress = 0;
          dissolved = false;
          holding = false;
        }

        drawBackgroundGlow(now);
        drawOrbiting(now, dt);
        drawParticles(now, dt);

        requestAnimationFrame(animate);
      }

      function startInteraction() {
        if (reducedMotion) {
          hero.classList.add("interacting");
          return;
        }

        if (dissolved) return;

        holding = true;
        dissolved = true;
        targetProgress = 1;
        progress = 0;
        dissolveStart = performance.now();
        hero.classList.add("interacting", "dissolving");
      }

      function endInteraction() {
        if (reducedMotion) return;
        if (!dissolved) {
          holding = false;
          hero.classList.remove("interacting");
        }
      }

      function handleMotionChange(event) {
        reducedMotion = event.matches;
        if (reducedMotion) {
          holding = false;
          dissolved = false;
          targetProgress = 0;
          progress = 0;
          spinAngle = 0;
          hero.classList.remove("interacting", "dissolving");
        } else {
          lastTime = performance.now();
        }
      }

      if (media.addEventListener) {
        media.addEventListener("change", handleMotionChange);
      } else if (media.addListener) {
        media.addListener(handleMotionChange);
      }

      hero.addEventListener("pointerenter", startInteraction);
      hero.addEventListener("pointerleave", endInteraction);
      hero.addEventListener("pointerdown", startInteraction);

      stage.addEventListener("focus", startInteraction);
      stage.addEventListener("blur", endInteraction);
      stage.addEventListener("keydown", (event) => {
        if (event.key === "Enter" || event.key === " ") {
          event.preventDefault();
          startInteraction();
        }
      });

      window.addEventListener("resize", resize, { passive: true });

      resize();
      requestAnimationFrame((time) => {
        lastTime = time;
        requestAnimationFrame(animate);
      });
    })();
  </script>
</body>
</html>

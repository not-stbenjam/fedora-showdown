<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fedora</title>
  <style>
    body, html {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: #0a0a0f;
      background-image: radial-gradient(circle at center, #111 0%, #0a0a0f 70%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: #9e9ea0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      user-select: none;
      touch-action: none;
    }
    main {
      text-align: center;
      padding: 1.5rem;
      box-sizing: border-box;
    }
    canvas {
      display: block;
      max-width: min(90vw, 500px);
      height: auto;
    }
    .caption {
      margin-top: 1.5rem;
      font-size: max(0.8rem, min(1.5vw, 1.2rem));
      letter-spacing: 0.15em;
      text-transform: uppercase;
      filter: drop-shadow(0 0 2px rgba(0,0,0,0.5));
      opacity: 0.8;
    }
    @media (hover: hover) and (pointer: fine) {
      canvas { cursor: pointer; }
    }
  </style>
</head>
<body>
  <main>
    <canvas id="c"></canvas>
    <div class="caption">Possibility Awaits</div>
  </main>
  <script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const hatPathStr = "M-80,0Q-40,-40 0,-50Q40,-40 80,0Q90,20 60,30Q30,40 0,35Q-30,40 -60,30Q-90,20 -80,0Z";
  let cw = 0, ch = 0;
  let hatPath = new Path2D(hatPathStr);
  let particles = [];
  let orbitingParticles = [];
  let phase = 'spinning';
  let triggerTime = 0;
  let spinAngle = 0;
  let spinVelocity = Math.PI * 0.2;
  let lastTime = 0;
  let dpr = 1;
  let isReduced = false;
  const DISSOLVE_DUR = 0.5;
  const SWIRL_DUR = 1.5;
  const REFORM_DUR = 1.0;
  const ORBIT_DUR = 0.0;

  function init() {
    isReduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    resize();
    window.addEventListener('resize', resize);
    if (isReduced) {
      drawStatic();
      return;
    }
    generateParticles();
    canvas.addEventListener('pointerenter', trigger);
    canvas.addEventListener('touchstart', trigger, { passive: true });
    canvas.addEventListener('click', trigger);
    requestAnimationFrame(animate);
  }

  function resize() {
    const rect = canvas.getBoundingClientRect();
    cw = rect.width;
    ch = rect.height;
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(cw * dpr);
    canvas.height = Math.round(ch * dpr);
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.scale(dpr, dpr);
    if (isReduced) drawStatic();
  }

  function generateParticles() {
    particles = [];
    const target = 1600;
    const bbox = { x: -95, y: -55, w: 190, h: 95 };
    for (let i = 0; i < target * 4; i++) {
      if (particles.length >= target) break;
      const x = bbox.x + Math.random() * bbox.w;
      const y = bbox.y + Math.random() * bbox.h;
      if (ctx.isPointInPath(hatPath, x, y)) {
        particles.push({
          homeX: x, homeY: y,
          x: x, y: y, vx: 0, vy: 0,
          size: 0.8 + Math.random() * 1.5,
          opacity: 0,
          isOrbiting: false,
          orbitAngle: 0,
          orbitRadius: 0,
          orbitSpeed: 0,
          prevX: x, prevY: y
        });
      }
    }
  }

  function trigger() {
    if (isReduced || phase !== 'spinning') return;
    triggerTime = performance.now();
    phase = 'dissolving';
    particles.forEach(p => {
      p.opacity = 0;
      p.isOrbiting = false;
      const ca = Math.cos(spinAngle), sa = Math.sin(spinAngle);
      p.x = p.homeX * ca - p.homeY * sa;
      p.y = p.homeX * sa + p.homeY * ca;
      const dx = p.x, dy = p.y, d = Math.sqrt(dx*dx + dy*dy);
      if (d > 1) {
        const a = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.8;
        const s = 2.5 + Math.random() * 2.5;
        p.vx = Math.cos(a) * s; p.vy = Math.sin(a) * s;
      } else {
        p.vx = (Math.random() - 0.5) * 4;
        p.vy = (Math.random() - 0.5) * 4;
      }
    });
    orbitingParticles = [];
  }

  function update(dt, now) {
    if (phase === 'spinning') {
      spinAngle += spinVelocity * dt;
      return;
    }

    const elapsed = (now - triggerTime) / 1000;

    if (phase === 'dissolving') {
      const p = Math.min(elapsed / DISSOLVE_DUR, 1);
      spinVelocity = Math.PI * 0.2 * (1 - p);
      spinAngle += spinVelocity * dt;
      particles.forEach(prt => {
        prt.x += prt.vx * dt;
        prt.y += prt.vy * dt;
        prt.opacity = p;
      });
      if (elapsed >= DISSOLVE_DUR) phase = 'swirling';
    }
    else if (phase === 'swirling') {
      particles.forEach(prt => {
        prt.x += prt.vx * dt;
        prt.y += prt.vy * dt;
        const cx = -prt.x, cy = -prt.y, d = Math.sqrt(cx*cx + cy*cy);
        if (d > 0.01) {
          prt.vx += cx / d * 0.18;
          prt.vy += cy / d * 0.18;
          prt.vx -= cy / d * (0.35 / d);
          prt.vy += cx / d * (0.35 / d);
          prt.vx *= 0.97; prt.vy *= 0.97;
        }
      });
      if (elapsed >= DISSOLVE_DUR + SWIRL_DUR) phase = 'reforming';
    }
    else if (phase === 'reforming') {
      particles.forEach(prt => {
        const dx = prt.homeX - prt.x, dy = prt.homeY - prt.y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d > 0.5) {
          prt.vx = dx * 0.14;
          prt.vy = dy * 0.14;
        } else {
          prt.x = prt.homeX; prt.y = prt.homeY;
          prt.vx = 0; prt.vy = 0;
        }
      });
      if (elapsed >= DISSOLVE_DUR + SWIRL_DUR + REFORM_DUR) {
        phase = 'orbiting';
        triggerTime = now;
        orbitingParticles = [];
        const candidates = particles.filter(p => Math.abs(p.homeX) < 70 && Math.abs(p.homeY) < 60);
        for (let i = 0; i < Math.min(65, candidates.length); i++) {
          const p = candidates[Math.floor(Math.random() * candidates.length)];
          p.isOrbiting = true;
          p.orbitRadius = Math.sqrt(p.homeX*p.homeX + p.homeY*p.homeY) * (0.7 + Math.random() * 0.6);
          p.orbitAngle = Math.atan2(p.homeY, p.homeX);
          p.orbitSpeed = (0.3 + Math.random() * 0.35) * (Math.random() < 0.5 ? 1 : -1);
          orbitingParticles.push(p);
        }
      }
    }
    else if (phase === 'orbiting') {
      const elapsed = (now - triggerTime) / 1000;
      if (elapsed > 3.5) {
        phase = 'spinning';
        spinVelocity = Math.PI * 0.2;
        particles.forEach(p => { p.isOrbiting = false; });
        orbitingParticles = [];
        return;
      }
      orbitingParticles.forEach(p => {
        p.orbitAngle += p.orbitSpeed * dt;
        p.x = Math.cos(p.orbitAngle) * p.orbitRadius;
        p.y = Math.sin(p.orbitAngle) * p.orbitRadius;
        p.prevX = p.x - Math.cos(p.orbitAngle - dt * p.orbitSpeed * 0.5) * p.orbitRadius * 0.98;
        p.prevY = p.y - Math.sin(p.orbitAngle - dt * p.orbitSpeed * 0.5) * p.orbitRadius * 0.98;
      });
    }
  }

  function draw() {
    ctx.clearRect(0, 0, cw, ch);
    const scale = Math.min(cw, ch) * 0.0025;
    ctx.save();
    ctx.translate(cw / 2, ch / 2);
    ctx.scale(scale, scale);

    if (phase === 'spinning' || phase === 'orbiting') {
      ctx.save();
      ctx.rotate(spinAngle);
      drawHat();
      ctx.restore();
    }
    else if (phase === 'dissolving') {
      const elapsed = (performance.now() - triggerTime) / 1000;
      const alpha = 1 - Math.min(elapsed / DISSOLVE_DUR, 1);
      if (alpha > 0) {
        ctx.globalAlpha = alpha;
        ctx.save();
        ctx.rotate(spinAngle);
        drawHat();
        ctx.restore();
        ctx.globalAlpha = 1;
      }
    }

    if (phase !== 'spinning') {
      particles.forEach(p => {
        if (phase === 'orbiting' && !p.isOrbiting) return;
        if (p.opacity <= 0.01) return;
        const s = p.size;
        const a = p.opacity * 0.75;
        ctx.globalAlpha = a;
        ctx.beginPath();
        ctx.arc(p.x, p.y, s * 2.8, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,72,64,${a * 0.35})`;
        ctx.fill();
        if (p.isOrbiting && phase === 'orbiting') {
          ctx.beginPath();
          ctx.moveTo(p.prevX, p.prevY);
          ctx.lineTo(p.x, p.y);
          ctx.strokeStyle = `rgba(255,110,90,${a * 0.18})`;
          ctx.lineWidth = s * 0.4;
          ctx.stroke();
        }
      });
      ctx.globalAlpha = 1;
    }

    ctx.restore();
  }

  function drawHat() {
    ctx.shadowColor = 'rgba(0,0,0,0.65)';
    ctx.shadowBlur = 40;
    ctx.shadowOffsetX = 0;
    ctx.shadowOffsetY = 12;
    const grad = ctx.createLinearGradient(-80, -55, 80, 45);
    grad.addColorStop(0, '#1d1d2a');
    grad.addColorStop(0.45, '#0d0d18');
    grad.addColorStop(1, '#080812');
    ctx.fillStyle = grad;
    ctx.fill(hatPath);
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.beginPath();
    ctx.ellipse(0, -42, 45, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.beginPath();
    ctx.ellipse(0, 38, 80, 35, 0, Math.PI, Math.PI * 2);
    ctx.fill();
  }

  function drawStatic() {
    resize();
    ctx.clearRect(0, 0, cw, ch);
    const scale = Math.min(cw, ch) * 0.0025;
    ctx.save();
    ctx.translate(cw / 2, ch / 2);
    ctx.scale(scale, scale);
    drawHat();
    ctx.restore();
  }

  function animate(now) {
    if (!lastTime) { lastTime = now; requestAnimationFrame(animate); return; }
    const dt = Math.min((now - lastTime) / 1000, 0.05);
    lastTime = now;
    if (!isReduced) {
      update(dt, now);
    }
    draw();
    requestAnimationFrame(animate);
  }

  init();
})();
  </script>
</body>
</html>

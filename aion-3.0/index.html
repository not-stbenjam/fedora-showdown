<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Red Fedora — Embers</title>
<style>
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{
    background:
      radial-gradient(120% 85% at 50% 36%, #16131d 0%, #0b0a12 46%, #050407 100%);
    color:#e8e6ef;
    font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow:hidden;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }
  .hero{
    position:fixed; inset:0;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    touch-action:manipulation;
    user-select:none;
    -webkit-user-select:none;
    outline:none;
  }
  #scene{ display:block; width:100%; height:100%; }
  .caption{
    position:absolute; left:0; right:0; bottom:7vh;
    text-align:center; pointer-events:none;
    padding:0 6vw;
  }
  .kicker{
    font-size:.72rem; text-transform:uppercase; letter-spacing:.42em;
    color:#8a8597; margin-bottom:.7rem; font-weight:600;
  }
  .title{
    font-size:1.05rem; color:#cac6d8; font-weight:400;
    text-shadow:0 1px 18px rgba(0,0,0,.6);
    max-width:34em; margin:0 auto; line-height:1.5;
  }
  .hint{
    margin-top:1.15rem; font-size:.74rem; color:#5d5a69;
    letter-spacing:.22em; text-transform:uppercase;
    transition:opacity .7s ease;
  }
  .hero.active .hint{ opacity:0; }
  @media (max-width:560px){
    .caption{ bottom:6vh; }
    .title{ font-size:.95rem; }
    .kicker{ font-size:.66rem; letter-spacing:.34em; }
  }
  @media (prefers-reduced-motion: reduce){
    .hint{ transition:none; }
  }
</style>
</head>
<body>
  <div class="hero" id="hero" tabindex="0" role="button" aria-label="Red Fedora. Hover or tap to scatter and reform.">
    <canvas id="scene" aria-hidden="true"></canvas>
    <div class="caption">
      <div class="kicker">Red Fedora</div>
      <div class="title">A logo, scattered into embers and reformed.</div>
      <div class="hint">Hover or tap</div>
    </div>
  </div>
<script>
(() => {
  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d');
  const hero = document.getElementById('hero');
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  let W=0, H=0, dpr=1, view=1, cxS=0, cyS=0;
  const particles = [];
  let orbiters = [];
  let orbitersActive = false;

  const state = {
    spin: 0,
    spinVel: 0,
    baseSpin: 0.018,
    tilt: 0.20,
    dissolving: false,
    t: 0,
    dur: 3.6,
    idle: true,
    intro: !reduced,
    introT: 0,
    introDur: 1.8,
  };
  if(reduced){ state.baseSpin = 0; state.tilt = 0.16; state.intro = false; }

  function resize(){
    dpr = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = Math.floor(W * dpr);
    canvas.height = Math.floor(H * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    view = Math.min(W, H) * 0.00155;
    view = Math.max(0.5, Math.min(view, 1.7));
    cxS = W / 2;
    cyS = H / 2 - Math.min(W, H) * 0.02;
  }
  window.addEventListener('resize', resize);

  // ---- Fedora artwork, drawn into an offscreen canvas, then sampled ----
  function drawFedora(c, cx, cy){
    c.save();
    c.translate(cx, cy);

    // Brim
    const g1 = c.createLinearGradient(0, 4, 0, 92);
    g1.addColorStop(0, '#c41a1a');
    g1.addColorStop(0.5, '#9a0e0e');
    g1.addColorStop(1, '#6a0606');
    c.fillStyle = g1;
    c.beginPath();
    c.ellipse(0, 46, 214, 44, 0, 0, Math.PI*2);
    c.fill();

    // Brim sheen
    const g1b = c.createLinearGradient(0, 6, 0, 52);
    g1b.addColorStop(0, 'rgba(255,130,118,0.34)');
    g1b.addColorStop(1, 'rgba(255,130,118,0)');
    c.fillStyle = g1b;
    c.beginPath();
    c.ellipse(0, 44, 200, 30, 0, 0, Math.PI*2);
    c.fill();

    // Crown
    const g2 = c.createLinearGradient(0, -122, 0, 44);
    g2.addColorStop(0, '#ec282c');
    g2.addColorStop(0.5, '#cc1414');
    g2.addColorStop(1, '#9c0c0c');
    c.fillStyle = g2;
    c.beginPath();
    c.moveTo(-88, 44);
    c.quadraticCurveTo(-82, -98, -38, -120);
    c.quadraticCurveTo(-20, -128, 0, -106);
    c.quadraticCurveTo(20, -128, 38, -120);
    c.quadraticCurveTo(82, -98, 88, 44);
    c.closePath();
    c.fill();

    // Crown highlight (left side)
    const g2b = c.createLinearGradient(-44, -118, -18, 44);
    g2b.addColorStop(0, 'rgba(255,184,174,0.30)');
    g2b.addColorStop(1, 'rgba(255,184,174,0)');
    c.fillStyle = g2b;
    c.beginPath();
    c.moveTo(-72, 44);
    c.quadraticCurveTo(-66, -96, -34, -116);
    c.quadraticCurveTo(-30, -120, -22, -104);
    c.quadraticCurveTo(-30, -90, -34, 44);
    c.closePath();
    c.fill();

    // Band
    c.fillStyle = '#0c0606';
    c.beginPath();
    c.moveTo(-87, 18);
    c.lineTo(87, 18);
    c.lineTo(84, 42);
    c.lineTo(-84, 42);
    c.closePath();
    c.fill();
    // Band upper shadow line
    c.fillStyle = 'rgba(0,0,0,0.45)';
    c.fillRect(-87, 18, 174, 3);

    c.restore();
  }

  function buildParticles(){
    const SZ = 520;
    const off = document.createElement('canvas');
    off.width = off.height = SZ;
    const c = off.getContext('2d');
    drawFedora(c, SZ/2, SZ/2);
    const img = c.getImageData(0, 0, SZ, SZ).data;
    const step = 3;
    for(let y=0; y<SZ; y+=step){
      for(let x=0; x<SZ; x+=step){
        const i = (y*SZ + x) * 4;
        if(img[i+3] > 24){
          const px = x - SZ/2;
          const py = y - SZ/2;
          const r = img[i], g = img[i+1], b = img[i+2];
          particles.push(makeP(px, py, (Math.random()-0.5)*4, r, g, b));
        }
      }
    }
  }

  function makeP(px, py, pz, r, g, b){
    const th = Math.random() * Math.PI * 2;
    const ph = Math.acos(2*Math.random() - 1);
    const dx = Math.sin(ph) * Math.cos(th);
    const dy = Math.cos(ph) * 0.7 + (Math.random()-0.5) * 0.3;
    const dz = Math.sin(ph) * Math.sin(th);
    const len = Math.hypot(dx, dy, dz) || 1;
    return {
      hx: px, hy: py, hz: pz,
      dx: dx/len, dy: dy/len, dz: dz/len,
      maxR: 70 + Math.random() * 180,
      baseAng: Math.random() * Math.PI * 2,
      swirl: (1.4 + Math.random()*2.2) * (Math.random() < 0.5 ? 1 : -1),
      drift: 8 + Math.random() * 22,
      fphase: Math.random() * Math.PI * 2,
      twinkle: Math.random() * Math.PI * 2,
      r, g, b,
      css: 'rgb(' + r + ',' + g + ',' + b + ')',
    };
  }

  const easeOutCubic = t => 1 - Math.pow(1-t, 3);
  const easeInOutCubic = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3)/2;

  function radiusProfile(t){
    if(t < 0.30) return easeOutCubic(t / 0.30);
    if(t < 0.74){
      const u = (t - 0.30) / 0.44;
      return 1 + 0.12 * Math.sin(u * Math.PI);
    }
    return 1 - easeInOutCubic((t - 0.74) / 0.26);
  }

  function trigger(){
    if(state.dissolving || state.intro) return;
    state.dissolving = true;
    state.t = 0;
    state.idle = false;
    hero.classList.add('active');
  }

  hero.addEventListener('pointerenter', () => { if(state.idle) trigger(); });
  hero.addEventListener('pointerdown', () => { if(!state.dissolving) trigger(); });
  hero.addEventListener('keydown', e => {
    if(e.key === ' ' || e.key === 'Enter'){
      e.preventDefault();
      if(!state.dissolving) trigger();
    }
  });

  function makeOrbiters(){
    orbiters = [];
    const n = reduced ? 0 : 16;
    for(let i=0; i<n; i++){
      orbiters.push({
        r: 150 + Math.random() * 120,
        angY: Math.random() * Math.PI * 2,
        speed: (0.16 + Math.random() * 0.30) * (Math.random() < 0.5 ? 1 : -1),
        yOff: (Math.random() - 0.5) * 120,
        wob: Math.random() * Math.PI * 2,
        size: 1.4 + Math.random() * 1.2,
        cr: 255,
        cg: 150 + (Math.random()*40 | 0),
        cb: 110 + (Math.random()*40 | 0),
        css: 'rgb(255,' + (150 + (Math.random()*40|0)) + ',' + (110 + (Math.random()*40|0)) + ')',
        trail: [],
      });
    }
  }

  let last = performance.now();
  function frame(now){
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    // Ease spin velocity toward target (slows during dissolve)
    const target = state.dissolving ? state.baseSpin * 0.06 : state.baseSpin;
    state.spinVel += (target - state.spinVel) * (reduced ? 1 : 0.06);
    if(!reduced) state.spin += state.spinVel * 60 * dt;

    if(state.intro){
      state.introT += dt / state.introDur;
      if(state.introT >= 1){ state.introT = 1; state.intro = false; }
    }

    if(state.dissolving){
      state.t += dt / (reduced ? state.dur * 1.5 : state.dur);
      if(state.t >= 1){
        state.t = 0;
        state.dissolving = false;
        state.idle = true;
        if(!orbitersActive){ makeOrbiters(); orbitersActive = true; }
      }
    }

    render(dt, now);
    requestAnimationFrame(frame);
  }

  function drawShadow(){
    const groundY = cyS + 70 * view;
    const sw = 210 * view * (Math.abs(Math.cos(state.spin)) * 0.7 + 0.5);
    const sh = 26 * view;
    if(sw <= 0) return;
    const sg = ctx.createRadialGradient(cxS, groundY, 0, cxS, groundY, sw);
    sg.addColorStop(0, 'rgba(0,0,0,0.42)');
    sg.addColorStop(0.6, 'rgba(0,0,0,0.18)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.save();
    ctx.translate(cxS, groundY);
    ctx.scale(1, sh / sw);
    ctx.translate(-cxS, -groundY);
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.arc(cxS, groundY, sw, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function render(dt, now){
    ctx.clearRect(0, 0, W, H);

    // Soft red glow behind the hat
    const glowR = Math.min(W, H) * 0.34;
    const gg = ctx.createRadialGradient(cxS, cyS, 0, cxS, cyS, glowR);
    gg.addColorStop(0, 'rgba(150,32,32,0.22)');
    gg.addColorStop(0.5, 'rgba(80,20,30,0.08)');
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gg;
    ctx.fillRect(0, 0, W, H);

    drawShadow();

    // Frame trig (computed once)
    const cy = Math.cos(state.spin), sy = Math.sin(state.spin);
    const cxr = Math.cos(state.tilt), sxr = Math.sin(state.tilt);
    const f = 760;

    const dissolving = state.dissolving;
    const introing = state.intro;
    const prof = dissolving ? radiusProfile(state.t) : 0;
    const t = state.t;
    const damp = reduced ? 0.55 : 1;
    const swirlDamp = reduced ? 0.3 : 1;

    ctx.globalCompositeOperation = 'lighter';

    for(let i=0; i<particles.length; i++){
      const p = particles[i];
      let wx, wy, wz;

      if(dissolving){
        const rt = prof * p.maxR * damp;
        const ang = p.baseAng + t * p.swirl * swirlDamp;
        const ca = Math.cos(ang), sa = Math.sin(ang);
        const ox = p.dx*ca + p.dz*sa;
        const oz = -p.dx*sa + p.dz*ca;
        const oy = p.dy + Math.sin(t*Math.PI*2 + p.fphase) * (p.drift / p.maxR) * 0.6;
        wx = p.hx + ox*rt;
        wy = p.hy + oy*rt;
        wz = p.hz + oz*rt;
      } else if(introing){
        const u = easeInOutCubic(Math.min(1, state.introT));
        const sc = 1 - u;
        const ca = Math.cos(p.baseAng), sa = Math.sin(p.baseAng);
        const ox = p.dx*ca + p.dz*sa;
        const oz = -p.dx*sa + p.dz*ca;
        wx = p.hx + ox * p.maxR * 1.3 * sc;
        wy = p.hy + p.dy * p.maxR * 1.3 * sc;
        wz = p.hz + oz * p.maxR * 1.3 * sc;
      } else {
        wx = p.hx; wy = p.hy; wz = p.hz;
      }

      // Rotate (spin around Y, then tilt around X) + perspective
      const x1 = wx*cy + wz*sy;
      const z1 = -wx*sy + wz*cy;
      const y2 = wy*cxr - z1*sxr;
      const z2 = wy*sxr + z1*cxr;
      const s = f / (f + z2);
      const sxp = cxS + x1 * s * view;
      const syp = cyS + y2 * s * view;

      let a;
      if(dissolving){
        const m = Math.sin(Math.min(1, t / 0.5) * Math.PI);
        a = 0.55 + 0.42 * m;
      } else if(introing){
        a = 0.25 + 0.58 * state.introT;
      } else {
        a = 0.78 + 0.12 * Math.sin(now * 0.002 + p.twinkle);
      }

      ctx.globalAlpha = a < 0 ? 0 : (a > 1 ? 1 : a);
      ctx.fillStyle = p.css;
      const rad = 1.5 * s * view * 0.9 + 0.4;
      ctx.beginPath();
      ctx.arc(sxp, syp, rad, 0, Math.PI*2);
      ctx.fill();
    }

    // Persistent orbiting embers (after first dissolve)
    if(orbitersActive){
      for(let i=0; i<orbiters.length; i++){
        const o = orbiters[i];
        o.angY += o.speed * dt;
        o.wob += dt * 0.8;
        const x = Math.cos(o.angY) * o.r;
        const z = Math.sin(o.angY) * o.r * 0.62;
        const y = o.yOff + Math.sin(o.wob) * 16;

        const x1 = x*cy + z*sy;
        const z1 = -x*sy + z*cy;
        const y2 = y*cxr - z1*sxr;
        const z2 = y*sxr + z1*cxr;
        const s = f / (f + z2);
        const sxp = cxS + x1 * s * view;
        const syp = cyS + y2 * s * view;

        o.trail.push([sxp, syp, s]);
        if(o.trail.length > 16) o.trail.shift();

        for(let k=0; k<o.trail.length; k++){
          const tp = o.trail[k];
          const frac = k / o.trail.length;
          ctx.globalAlpha = frac * 0.5;
          ctx.fillStyle = o.css;
          const rr = (0.6 + frac * 0.8) * tp[2] + 0.3;
          ctx.beginPath();
          ctx.arc(tp[0], tp[1], rr, 0, Math.PI*2);
          ctx.fill();
        }
        ctx.globalAlpha = 0.92;
        ctx.fillStyle = o.css;
        ctx.beginPath();
        ctx.arc(sxp, syp, o.size * s + 0.5, 0, Math.PI*2);
        ctx.fill();
      }
    }

    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
  }

  resize();
  buildParticles();
  requestAnimationFrame(now => { last = now; frame(now); });
})();
</script>
</body>
</html>

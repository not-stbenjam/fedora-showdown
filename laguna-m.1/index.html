<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fedora Logo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body {
    height: 100%;
    overflow: hidden;
    background: linear-gradient(135deg, #0a0a12, #12121d);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .scene {
    perspective: 1000px;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .fedora-container {
    position: relative;
    width: 200px;
    height: 200px;
    transform-style: preserve-3d;
    cursor: pointer;
  }

  .fedora {
    width: 100%;
    height: 100%;
    position: relative;
    filter: drop-shadow(0 10px 30px rgba(220, 20, 60, 0.4));
  }

  .fedora.spinning {
    animation: spin 8s linear infinite;
  }

  @media (prefers-reduced-motion: reduce) {
    .fedora.spinning {
      animation: none;
    }
  }

  @keyframes spin {
    from { transform: rotateY(0deg) rotateX(10deg); }
    to { transform: rotateY(360deg) rotateX(10deg); }
  }

  .fedora:hover {
    animation-duration: 40s;
  }

  /* Fedora shape - simplified silhouette */
  .fedora::before {
    content: '';
    position: absolute;
    width: 140px;
    height: 45px;
    background: #c00;
    border-radius: 70px 70px 15px 15px;
    top: 35px;
    left: 30px;
    box-shadow: 
      inset 0 0 20px rgba(0,0,0,0.3),
      0 0 30px rgba(220, 20, 60, 0.5);
  }

  .fedora::after {
    content: '';
    position: absolute;
    width: 160px;
    height: 25px;
    background: #c00;
    border-radius: 50%;
    top: 80px;
    left: 20px;
    box-shadow: 
      inset 0 0 20px rgba(0,0,0,0.3),
      0 5px 25px rgba(220, 20, 60, 0.4);
  }

  .fedora-top {
    position: absolute;
    width: 150px;
    height: 150px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #e60026, #a00);
    top: 25px;
    left: 25px;
    box-shadow: 
      inset -10px -10px 20px rgba(0,0,0,0.4),
      inset 10px 10px 20px rgba(255,255,255,0.15),
      0 0 40px rgba(220, 20, 60, 0.6);
  }

  .fedora-top::before {
    content: '';
    position: absolute;
    width: 130px;
    height: 130px;
    border-radius: 50%;
    background: radial-gradient(circle at 40% 40%, #c00, #800);
    top: 10px;
    left: 10px;
    box-shadow: inset -8px -8px 15px rgba(0,0,0,0.4);
  }

  .caption {
    position: absolute;
    bottom: -50px;
    left: 0;
    right: 0;
    text-align: center;
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  canvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
  }
</style>
</head>
<body>
  <div class="scene">
    <div class="fedora-container" id="fedoraContainer">
      <div class="fedora spinning" id="fedora">
        <div class="fedora-top"></div>
      </div>
      <div class="caption">Red Hat Fedora</div>
    </div>
  </div>
  <canvas id="particles"></canvas>

<script>
  const fedora = document.getElementById('fedora');
  const container = document.getElementById('fedoraContainer');
  const canvas = document.getElementById('particles');
  const ctx = canvas.getContext('2d');
  
  let particles = [];
  let isAnimating = false;
  let originalParticles = [];
  let orbitingParticles = [];
  let reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // Particle system
  class Particle {
    constructor(x, y, vx, vy, color) {
      this.x = x;
      this.y = y;
      this.vx = vx;
      this.vy = vy;
      this.life = 1;
      this.originalLife = 1;
      this.color = color;
      this.size = Math.random() * 2.5 + 0.8;
      this.trail = [];
      this.swirlOffset = Math.random() * 100;
    }

    update() {
      this.trail.push({x: this.x, y: this.y, life: this.life});
      if (this.trail.length > 5) this.trail.shift();
      
      this.x += this.vx;
      this.y += this.vy;
      this.vy += 0.03;
      this.vx *= 0.992;
      this.vy *= 0.992;
    }

    draw() {
      const alpha = Math.max(0, this.life);
      ctx.globalAlpha = alpha;
      
      // Draw trail
      for (let i = 0; i < this.trail.length - 1; i++) {
        const t = this.trail[i];
        const next = this.trail[i + 1];
        ctx.strokeStyle = this.color;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(t.x, t.y);
        ctx.lineTo(next.x, next.y);
        ctx.stroke();
      }
      
      // Draw particle with soft glow
      const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * 2);
      grad.addColorStop(0, this.color);
      grad.addColorStop(1, 'rgba(255,68,100,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(this.x, this.y, this.size * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Get fedora shape points
  function getFedoraShape() {
    const rect = fedora.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const shape = [];
    const width = rect.width;
    
    // Top circle
    for (let angle = 0; angle < Math.PI * 2; angle += Math.PI / 10) {
      shape.push({
        x: cx + Math.cos(angle) * 75,
        y: cy + Math.sin(angle) * 75 - 25
      });
    }
    
    // Main body
    for (let i = -70; i <= 70; i += 10) {
      shape.push({ x: cx + i, y: cy + 25 });
      shape.push({ x: cx + i, y: cy + 60 });
    }
    
    return shape;
  }

  function explode() {
    if (isAnimating || reducedMotion) return;
    isAnimating = true;
    
    const shape = getFedoraShape();
    const colors = ['#ff2244', '#ff4466', '#ff6688', '#ff88aa', '#ffaaaa'];
    
    particles = shape.map(p => {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 10 + 3;
      return new Particle(
        p.x, p.y,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed - 2,
        colors[Math.floor(Math.random() * colors.length)]
      );
    });
    
    const centerX = shape.reduce((s, p) => s + p.x, 0) / shape.length;
    const centerY = shape.reduce((s, p) => s + p.y, 0) / shape.length;
    
    // Add more particles for density
    for (let i = 0; i < 400; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = Math.random() * 5 + 1;
      particles.push(new Particle(
        centerX, centerY,
        Math.cos(angle) * speed,
        Math.sin(angle) * speed,
        colors[Math.floor(Math.random() * colors.length)]
      ));
    }
    
    originalParticles = [...particles];
    
    // Hide fedora
    fedora.style.opacity = '0';
    fedora.style.transition = 'opacity 0.5s';
    
    animateParticles();
  }

  function reform() {
    const shape = getFedoraShape();
    const targetPoints = shape.slice(0, originalParticles.length);
    
    // First swirl around for a moment
    let swirlTime = 0;
    const swirlDuration = 1200;
    const startPositions = particles.map(p => ({x: p.x, y: p.y}));
    
    const swirlInterval = setInterval(() => {
      swirlTime += 50;
      
      particles.forEach((p, i) => {
        const progress = swirlTime / swirlDuration;
        const swirlAngle = progress * Math.PI * 4;
        const start = startPositions[i];
        const centerX = canvas.width / 2;
        const centerY = canvas.height / 2;
        
        p.x = start.x + Math.cos(swirlAngle + i * 0.1) * 50 * (1 - progress);
        p.y = start.y + Math.sin(swirlAngle + i * 0.1) * 50 * (1 - progress);
      });
      
      if (swirlTime >= swirlDuration) {
        clearInterval(swirlInterval);
        
        // Now flow back to position
        let index = 0;
        const flowInterval = setInterval(() => {
          if (index >= originalParticles.length) {
            clearInterval(flowInterval);
            
            // Create orbiting particles
            orbitingParticles = [];
            for (let i = 0; i < 10; i++) {
              const angle = (i / 10) * Math.PI * 2;
              orbitingParticles.push({
                angle: angle,
                radius: 85,
                speed: 0.015 + Math.random() * 0.008,
                height: 20,
                color: ['#ff3355', '#ff6688', '#ff99aa'][i % 3]
              });
            }
            
            // Show fedora
            fedora.style.opacity = '1';
            isAnimating = false;
            return;
          }
          
          const target = targetPoints[index];
          if (target && particles[index]) {
            particles[index].x = target.x;
            particles[index].y = target.y;
            particles[index].vx = 0;
            particles[index].vy = 0;
            particles[index].life = 1;
          }
          index++;
        }, 5);
      }
    }, 50);
  }

  function animateParticles() {
    const animate = () => {
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width;
      canvas.height = rect.height;
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      
      // Orbiting particles with soft glow
      orbitingParticles.forEach((orb) => {
        orb.angle += orb.speed;
        const x = canvas.width / 2 + Math.cos(orb.angle) * orb.radius;
        const y = canvas.height / 2 + Math.sin(orb.angle) * orb.radius * 0.4 + orb.height;
        
        const grad = ctx.createRadialGradient(x, y, 0, x, y, 4);
        grad.addColorStop(0, orb.color);
        grad.addColorStop(1, 'rgba(255,68,100,0)');
        
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      
      requestAnimationFrame(animate);
    };
    
    animate();
  }

  // Event listeners
  container.addEventListener('mouseenter', explode);
  container.addEventListener('touchstart', (e) => {
    e.preventDefault();
    explode();
  });

  // Handle resize
  window.addEventListener('resize', () => {
    const rect = canvas.getBoundingClientRect();
    canvas.width = rect.width;
    canvas.height = rect.height;
  });

  // Start animation loop for orbiting particles
  animateParticles();
</script>
</body>
</html>
